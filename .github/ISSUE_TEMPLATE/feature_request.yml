name: Feature request
description: Suggest an improvement for OrbinexSimulation or @galihru/orbinexsim.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your idea. Please describe the use case and expected impact.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: I cannot easily ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution.
      placeholder: Add a new API/functionality that ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options or workarounds you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or related issues.
