name: AI Maintainer (Ollama + Aider)

on:
  workflow_dispatch:
    inputs:
      task:
        description: AI task description (feature, bug fix, refactor, docs)
        required: true
        type: string
      issue_number:
        description: Optional issue number to link
        required: false
        type: string
      base_branch:
        description: Base branch for the PR
        required: false
        default: main
        type: string
      retry_count:
        description: Internal retry counter
        required: false
        default: "0"
        type: string
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-maintainer-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  ai-maintainer:
    if: >
      github.actor != 'github-actions[bot]' && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && startsWith(github.event.comment.body, '/ai')) ||
        (github.event_name == 'issues' && github.event.label.name == 'ai-task')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare task context
        id: task
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let task = "";
            let issueNumber = "";
            let baseBranch = "main";
            let retryCount = "0";

            if (eventName === "workflow_dispatch") {
              const inputs = context.payload.inputs || {};
              task = String(inputs.task || "").trim();
              issueNumber = String(inputs.issue_number || "").trim();
              baseBranch = String(inputs.base_branch || "main").trim();
              retryCount = String(inputs.retry_count || "0").trim() || "0";
            } else if (eventName === "issue_comment") {
              issueNumber = String(context.payload.issue.number);
              baseBranch = context.payload.repository.default_branch || "main";
              retryCount = "0";

              const commentBody = (context.payload.comment.body || "").trim();
              let commandTask = commentBody.replace(/^\/ai\s*/i, "").trim();

              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
              });

              const title = issue.data.title || "";
              const body = issue.data.body || "";

              if (!commandTask) {
                commandTask = "Please implement the issue request with the smallest safe change and update relevant docs/tests.";
              }

              task = [
                commandTask,
                "",
                `Issue #${issueNumber}: ${title}`,
                body,
              ].join("\n").trim();
            } else if (eventName === "issues") {
              issueNumber = String(context.payload.issue.number);
              baseBranch = context.payload.repository.default_branch || "main";
              retryCount = "0";

              const title = context.payload.issue.title || "";
              const body = context.payload.issue.body || "";

              task = [
                "Implement this issue with safe, minimal changes. Add tests/docs when needed.",
                "",
                `Issue #${issueNumber}: ${title}`,
                body,
              ].join("\n").trim();
            }

            if (!task) {
              core.setFailed("Task is empty. Provide a task or use '/ai <task>' in an issue comment.");
              return;
            }

            core.setOutput("task", task);
            core.setOutput("task_dispatch", task.replace(/\s+/g, " ").trim());
            core.setOutput("issue_number", issueNumber);
            core.setOutput("base_branch", baseBranch);
            core.setOutput("retry_count", retryCount);

      - name: Enforce daily run limit
        id: daily_limit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          python - << 'PY'
          import datetime
          import json
          import os
          import urllib.request

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          current_run_id = int(os.environ["CURRENT_RUN_ID"])

          url = f"https://api.github.com/repos/{repo}/actions/workflows/ai-maintainer.yml/runs?per_page=50"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
              },
              method="GET",
          )

          with urllib.request.urlopen(req, timeout=30) as resp:
              payload = json.loads(resp.read().decode("utf-8"))

          threshold = datetime.datetime.now(datetime.timezone.utc) - datetime.timedelta(hours=24)
          blocked_by = ""

          for run in payload.get("workflow_runs", []):
              run_id = int(run.get("id", 0))
              if run_id == current_run_id:
                  continue

              created_raw = run.get("created_at")
              if not created_raw:
                  continue

              created_at = datetime.datetime.fromisoformat(created_raw.replace("Z", "+00:00"))
              if created_at < threshold:
                  continue

              if run.get("status") in {"queued", "in_progress", "completed"}:
                  blocked_by = run.get("html_url", "")
                  break

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as out:
              if blocked_by:
                  out.write("allowed=false\n")
                  out.write(f"blocked_by={blocked_by}\n")
              else:
                  out.write("allowed=true\n")
                  out.write("blocked_by=\n")
          PY

      - name: Notify daily-limit skip
        if: steps.daily_limit.outputs.allowed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NO: ${{ steps.task.outputs.issue_number }}
          BLOCKED_BY: ${{ steps.daily_limit.outputs.blocked_by }}
        run: |
          echo "Daily limit active: this workflow runs at most once per 24h."

          if [ -n "$ISSUE_NO" ]; then
            MSG="[AI Orbinex based Gemini] skipped: daily limit active (1 run per 24h)."
            if [ -n "$BLOCKED_BY" ]; then
              MSG="$MSG Previous run: $BLOCKED_BY"
            fi

            gh issue comment "$ISSUE_NO" --repo "${{ github.repository }}" --body "$MSG"
          fi

      - name: Stop when daily limit reached
        if: steps.daily_limit.outputs.allowed != 'true'
        run: exit 0

      - name: Setup Python
        if: steps.daily_limit.outputs.allowed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.daily_limit.outputs.allowed == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install aider-chat

      - name: Select AI provider
        if: steps.daily_limit.outputs.allowed == 'true'
        id: provider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ] || [ -n "$GOOGLE_API_KEY" ]; then
            echo "name=gemini" >> "$GITHUB_OUTPUT"
          else
            echo "name=ollama" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Ollama
        if: steps.daily_limit.outputs.allowed == 'true' && steps.provider.outputs.name == 'ollama'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        if: steps.daily_limit.outputs.allowed == 'true' && steps.provider.outputs.name == 'ollama'
        id: ollama
        run: |
          OLLAMA_HOST=127.0.0.1:11434 ollama serve > /tmp/ollama.log 2>&1 &

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          MODEL="${{ vars.OLLAMA_MODEL }}"
          if [ -z "$MODEL" ]; then
            MODEL="qwen2.5-coder:1.5b"
          fi

          if ! ollama pull "$MODEL"; then
            MODEL="llama3.2:1b"
            ollama pull "$MODEL"
          fi

          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Create working branch
        if: steps.daily_limit.outputs.allowed == 'true'
        id: branch
        run: |
          BASE_BRANCH="${{ steps.task.outputs.base_branch }}"
          BRANCH_NAME="ai/task-${{ github.run_id }}"
          git fetch origin "$BASE_BRANCH"
          git checkout -b "$BRANCH_NAME" "origin/$BASE_BRANCH"
          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Run Aider with Smart Fallback
        if: steps.daily_limit.outputs.allowed == 'true'
        id: run_ai
        continue-on-error: true
        env:
          AI_TASK: ${{ steps.task.outputs.task }}
          AI_PROVIDER: ${{ steps.provider.outputs.name }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          OLLAMA_API_BASE: http://127.0.0.1:11434
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL }}
        run: |
          set +e

          MAX_FILES=6
          mapfile -t FILE_LIST < <(
            git ls-files orbinexsim-npm/src \
              | grep -E '^orbinexsim-npm/src/.*\.(ts|tsx|js|jsx|mjs|cjs)$' \
              | head -n "$MAX_FILES"
          )

          if [ "${#FILE_LIST[@]}" -eq 0 ]; then
            echo "No npm module files selected for Aider context."
            exit 1
          fi

          SCOPED_TASK="$AI_TASK

          Hard constraints:
          - Only modify files under orbinexsim-npm.
          - Focus on program/code changes only.
          - If needed, you may create new supporting source files under orbinexsim-npm/src and wire imports.
          - Do not edit documentation, license, or workflow files."

          echo "Selected ${#FILE_LIST[@]} npm module files for Aider context:"
          printf ' - %s\n' "${FILE_LIST[@]}"

          run_aider() {
            local model="$1"
            local timeout_sec="$2"
            local log_file="$3"

            timeout "$timeout_sec" aider \
              --yes \
              --no-auto-commits \
              --no-gitignore \
              --encoding utf-8 \
              --map-tokens 512 \
              --model "$model" \
              --message "$SCOPED_TASK" \
              "${FILE_LIST[@]}" 2>&1 | tee "$log_file"

            return ${PIPESTATUS[0]}
          }

          is_rate_limited() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              return 1
            fi
            grep -Eiq "RateLimitError|RESOURCE_EXHAUSTED|quota exceeded|\b429\b" "$log_file"
          }

          ensure_ollama() {
            if ! command -v ollama >/dev/null 2>&1; then
              curl -fsSL https://ollama.com/install.sh | sh
            fi

            if ! curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
              OLLAMA_HOST=127.0.0.1:11434 ollama serve > /tmp/ollama.log 2>&1 &
              for i in {1..30}; do
                if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
                  break
                fi
                sleep 1
              done
            fi

            local model="$OLLAMA_MODEL"
            if [ -z "$model" ]; then
              model="qwen2.5-coder:1.5b"
            fi

            if ! ollama pull "$model"; then
              model="llama3.2:1b"
              ollama pull "$model"
            fi

            OLLAMA_MODEL="$model"
          }

          STATUS=1
          USED_PROVIDER=""
          RESPONDER_NAME="AI Orbinex"

          if [ "$AI_PROVIDER" = "gemini" ]; then
            if [ -z "$GEMINI_API_KEY" ] && [ -n "$GOOGLE_API_KEY" ]; then
              export GEMINI_API_KEY="$GOOGLE_API_KEY"
            fi

            MODEL_NAME="$GEMINI_MODEL"
            if [ -z "$MODEL_NAME" ]; then
              MODEL_NAME="gemini-2.0-flash"
            fi

            run_aider "gemini/${MODEL_NAME}" 180 /tmp/aider-gemini-primary.log
            STATUS=$?

            if [ "$STATUS" -eq 0 ] && is_rate_limited /tmp/aider-gemini-primary.log; then
              STATUS=88
            fi

            if [ "$STATUS" -eq 0 ]; then
              USED_PROVIDER="gemini/${MODEL_NAME}"
              RESPONDER_NAME="AI Orbinex based Gemini (${MODEL_NAME})"
            fi

            if [ "$STATUS" -ne 0 ]; then
              FALLBACK_MODEL="$GEMINI_FALLBACK_MODEL"
              if [ -z "$FALLBACK_MODEL" ]; then
                FALLBACK_MODEL="gemini-1.5-flash"
              fi

              if [ "$FALLBACK_MODEL" != "$MODEL_NAME" ]; then
                run_aider "gemini/${FALLBACK_MODEL}" 180 /tmp/aider-gemini-fallback.log
                STATUS=$?

                if [ "$STATUS" -eq 0 ] && is_rate_limited /tmp/aider-gemini-fallback.log; then
                  STATUS=89
                fi

                if [ "$STATUS" -eq 0 ]; then
                  USED_PROVIDER="gemini/${FALLBACK_MODEL}"
                  RESPONDER_NAME="AI Orbinex based Gemini (${FALLBACK_MODEL})"
                fi
              fi
            fi
          fi

          if [ "$STATUS" -ne 0 ]; then
            ensure_ollama

            run_aider "ollama/${OLLAMA_MODEL}" 480 /tmp/aider-ollama.log
            STATUS=$?

            if [ "$STATUS" -eq 0 ]; then
              USED_PROVIDER="ollama/${OLLAMA_MODEL}"
              RESPONDER_NAME="AI Orbinex based Ollama (${OLLAMA_MODEL})"
            fi
          else
            true
          fi

          if [ "$STATUS" -ne 0 ]; then
            run_aider "ollama_chat/${OLLAMA_MODEL}" 480 /tmp/aider-ollama-chat.log
            STATUS=$?

            if [ "$STATUS" -eq 0 ]; then
              USED_PROVIDER="ollama_chat/${OLLAMA_MODEL}"
              RESPONDER_NAME="AI Orbinex based Ollama (${OLLAMA_MODEL})"
            fi
          fi

          echo "used_provider=$USED_PROVIDER" >> "$GITHUB_OUTPUT"
          echo "responder_name=$RESPONDER_NAME" >> "$GITHUB_OUTPUT"

          set -e

          if [ "$STATUS" -ne 0 ]; then
            echo "Aider failed after trying Gemini/Ollama fallbacks."
            exit "$STATUS"
          fi

      - name: Fail workflow when AI step failed
        if: steps.daily_limit.outputs.allowed == 'true' && steps.run_ai.outcome == 'failure'
        run: exit 1

      - name: Check for changes
        if: steps.daily_limit.outputs.allowed == 'true' && steps.run_ai.outcome == 'success'
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.daily_limit.outputs.allowed == 'true' && steps.run_ai.outcome == 'success' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          ISSUE_NO="${{ steps.task.outputs.issue_number }}"
          if [ -n "$ISSUE_NO" ]; then
            git commit -m "feat(ai): automated update for issue #$ISSUE_NO"
          else
            git commit -m "feat(ai): automated repository update"
          fi

      - name: Push branch
        if: steps.daily_limit.outputs.allowed == 'true' && steps.run_ai.outcome == 'success' && steps.changes.outputs.changed == 'true'
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: Open pull request
        if: steps.daily_limit.outputs.allowed == 'true' && steps.run_ai.outcome == 'success' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_RESPONDER: ${{ steps.run_ai.outputs.responder_name }}
          AI_PROVIDER_USED: ${{ steps.run_ai.outputs.used_provider }}
        run: |
          ISSUE_NO="${{ steps.task.outputs.issue_number }}"
          BASE_BRANCH="${{ steps.task.outputs.base_branch }}"
          BRANCH_NAME="${{ steps.branch.outputs.name }}"

          RESPONDER="$AI_RESPONDER"
          if [ -z "$RESPONDER" ]; then
            RESPONDER="AI Orbinex"
          fi

          PROVIDER_NOTE=""
          if [ -n "$AI_PROVIDER_USED" ]; then
            PROVIDER_NOTE="\n\nProvider: $AI_PROVIDER_USED"
          fi

          if [ -n "$ISSUE_NO" ]; then
            PR_TITLE="AI Update for issue #$ISSUE_NO"
            PR_BODY="$RESPONDER generated automated update for issue #$ISSUE_NO.\n\nPlease review carefully before merging.$PROVIDER_NOTE"
          else
            PR_TITLE="AI Automated Repository Update"
            PR_BODY="$RESPONDER generated automated update from workflow dispatch.\n\nPlease review carefully before merging.$PROVIDER_NOTE"
          fi

          gh pr create \
            --repo "${{ github.repository }}" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "$PR_BODY"

      - name: Comment on issue with PR link
        if: steps.daily_limit.outputs.allowed == 'true' && steps.run_ai.outcome == 'success' && steps.changes.outputs.changed == 'true' && steps.task.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_RESPONDER: ${{ steps.run_ai.outputs.responder_name }}
        run: |
          ISSUE_NO="${{ steps.task.outputs.issue_number }}"
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          PR_URL=$(gh pr view "$BRANCH_NAME" --repo "${{ github.repository }}" --json url --jq '.url')
          RESPONDER="$AI_RESPONDER"
          if [ -z "$RESPONDER" ]; then
            RESPONDER="AI Orbinex"
          fi
          gh issue comment "$ISSUE_NO" --repo "${{ github.repository }}" --body "[$RESPONDER] finished and opened a PR: $PR_URL"

      - name: Comment when no changes were produced
        if: steps.daily_limit.outputs.allowed == 'true' && steps.run_ai.outcome == 'success' && steps.changes.outputs.changed != 'true' && steps.task.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_RESPONDER: ${{ steps.run_ai.outputs.responder_name }}
          AI_PROVIDER_USED: ${{ steps.run_ai.outputs.used_provider }}
        run: |
          RESPONDER="$AI_RESPONDER"
          if [ -z "$RESPONDER" ]; then
            RESPONDER="AI Orbinex"
          fi
          EXTRA=""
          if [ -n "$AI_PROVIDER_USED" ]; then
            EXTRA=" (provider: $AI_PROVIDER_USED)"
          fi
          gh issue comment "${{ steps.task.outputs.issue_number }}" --repo "${{ github.repository }}" --body "[$RESPONDER] run completed$EXTRA but no file changes were generated for this task."
