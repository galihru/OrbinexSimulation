name: AI Maintainer (Ollama + Aider)

on:
  workflow_dispatch:
    inputs:
      task:
        description: AI task description (feature, bug fix, refactor, docs)
        required: true
        type: string
      issue_number:
        description: Optional issue number to link
        required: false
        type: string
      base_branch:
        description: Base branch for the PR
        required: false
        default: main
        type: string
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-maintainer-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  ai-maintainer:
    if: >
      github.actor != 'github-actions[bot]' && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && startsWith(github.event.comment.body, '/ai')) ||
        (github.event_name == 'issues' && github.event.label.name == 'ai-task')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare task context
        id: task
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let task = "";
            let issueNumber = "";
            let baseBranch = "main";

            if (eventName === "workflow_dispatch") {
              const inputs = context.payload.inputs || {};
              task = String(inputs.task || "").trim();
              issueNumber = String(inputs.issue_number || "").trim();
              baseBranch = String(inputs.base_branch || "main").trim();
            } else if (eventName === "issue_comment") {
              issueNumber = String(context.payload.issue.number);
              baseBranch = context.payload.repository.default_branch || "main";

              const commentBody = (context.payload.comment.body || "").trim();
              let commandTask = commentBody.replace(/^\/ai\s*/i, "").trim();

              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
              });

              const title = issue.data.title || "";
              const body = issue.data.body || "";

              if (!commandTask) {
                commandTask = "Please implement the issue request with the smallest safe change and update relevant docs/tests.";
              }

              task = [
                commandTask,
                "",
                `Issue #${issueNumber}: ${title}`,
                body,
              ].join("\n").trim();
            } else if (eventName === "issues") {
              issueNumber = String(context.payload.issue.number);
              baseBranch = context.payload.repository.default_branch || "main";

              const title = context.payload.issue.title || "";
              const body = context.payload.issue.body || "";

              task = [
                "Implement this issue with safe, minimal changes. Add tests/docs when needed.",
                "",
                `Issue #${issueNumber}: ${title}`,
                body,
              ].join("\n").trim();
            }

            if (!task) {
              core.setFailed("Task is empty. Provide a task or use '/ai <task>' in an issue comment.");
              return;
            }

            core.setOutput("task", task);
            core.setOutput("issue_number", issueNumber);
            core.setOutput("base_branch", baseBranch);

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install aider-chat

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        id: ollama
        run: |
          OLLAMA_HOST=127.0.0.1:11434 ollama serve > /tmp/ollama.log 2>&1 &

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          MODEL="${{ vars.OLLAMA_MODEL }}"
          if [ -z "$MODEL" ]; then
            MODEL="qwen2.5-coder:1.5b"
          fi

          if ! ollama pull "$MODEL"; then
            MODEL="llama3.2:1b"
            ollama pull "$MODEL"
          fi

          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Create working branch
        id: branch
        run: |
          BASE_BRANCH="${{ steps.task.outputs.base_branch }}"
          BRANCH_NAME="ai/task-${{ github.run_id }}"
          git fetch origin "$BASE_BRANCH"
          git checkout -b "$BRANCH_NAME" "origin/$BASE_BRANCH"
          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Run Aider with Ollama
        env:
          AI_TASK: ${{ steps.task.outputs.task }}
          OLLAMA_MODEL: ${{ steps.ollama.outputs.model }}
          OLLAMA_API_BASE: http://127.0.0.1:11434
        run: |
          set +e

          MAX_FILES=6
          mapfile -t FILE_LIST < <(
            git ls-files orbinexsim-npm/src \
              | grep -E '^orbinexsim-npm/src/.*\.(ts|tsx|js|jsx|mjs|cjs)$' \
              | head -n "$MAX_FILES"
          )

          if [ "${#FILE_LIST[@]}" -eq 0 ]; then
            echo "No npm module files selected for Aider context."
            exit 1
          fi

          SCOPED_TASK=$(cat <<EOF
$AI_TASK

Hard constraints:
- Only modify files under orbinexsim-npm.
- Focus on program/code changes only.
- Do not edit documentation, license, or workflow files.
EOF
)

          echo "Selected ${#FILE_LIST[@]} npm module files for Aider context:"
          printf ' - %s\n' "${FILE_LIST[@]}"

          timeout 480 aider \
            --yes \
            --no-auto-commits \
            --no-gitignore \
            --encoding utf-8 \
            --map-tokens 512 \
            --model "ollama/${OLLAMA_MODEL}" \
            --message "$SCOPED_TASK" \
            "${FILE_LIST[@]}"
          STATUS=$?

          if [ "$STATUS" -ne 0 ]; then
            timeout 480 aider \
              --yes \
              --no-auto-commits \
              --no-gitignore \
              --encoding utf-8 \
              --map-tokens 512 \
              --model "ollama_chat/${OLLAMA_MODEL}" \
              --message "$SCOPED_TASK" \
              "${FILE_LIST[@]}"
            STATUS=$?
          fi

          set -e

          if [ "$STATUS" -ne 0 ]; then
            echo "Aider failed with Ollama model ${OLLAMA_MODEL}."
            exit "$STATUS"
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          ISSUE_NO="${{ steps.task.outputs.issue_number }}"
          if [ -n "$ISSUE_NO" ]; then
            git commit -m "feat(ai): automated update for issue #$ISSUE_NO"
          else
            git commit -m "feat(ai): automated repository update"
          fi

      - name: Push branch
        if: steps.changes.outputs.changed == 'true'
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ steps.task.outputs.issue_number }}"
          BASE_BRANCH="${{ steps.task.outputs.base_branch }}"
          BRANCH_NAME="${{ steps.branch.outputs.name }}"

          if [ -n "$ISSUE_NO" ]; then
            PR_TITLE="AI Update for issue #$ISSUE_NO"
            PR_BODY="Automated AI update generated from issue #$ISSUE_NO.\n\nPlease review carefully before merging."
          else
            PR_TITLE="AI Automated Repository Update"
            PR_BODY="Automated AI update generated from workflow dispatch.\n\nPlease review carefully before merging."
          fi

          gh pr create \
            --repo "${{ github.repository }}" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "$PR_BODY"

      - name: Comment on issue with PR link
        if: steps.changes.outputs.changed == 'true' && steps.task.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ steps.task.outputs.issue_number }}"
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          PR_URL=$(gh pr view "$BRANCH_NAME" --repo "${{ github.repository }}" --json url --jq '.url')
          gh issue comment "$ISSUE_NO" --repo "${{ github.repository }}" --body "AI finished and opened a PR: $PR_URL"

      - name: Comment when no changes were produced
        if: steps.changes.outputs.changed != 'true' && steps.task.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.task.outputs.issue_number }}" --repo "${{ github.repository }}" --body "AI run completed but no file changes were generated for this task."
