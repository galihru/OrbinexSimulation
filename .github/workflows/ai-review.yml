name: AI PR Review (Ollama)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    if: github.event.pull_request.draft == false && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        id: ollama
        run: |
          OLLAMA_HOST=127.0.0.1:11434 ollama serve > /tmp/ollama.log 2>&1 &

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          MODEL="${{ vars.OLLAMA_MODEL }}"
          if [ -z "$MODEL" ]; then
            MODEL="qwen2.5-coder:1.5b"
          fi

          if ! ollama pull "$MODEL"; then
            MODEL="llama3.2:1b"
            ollama pull "$MODEL"
          fi

          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Fetch PR metadata and diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} --jq '.title + "\n\n" + (.body // "")' > pr_meta.txt
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > pr.diff

      - name: Generate review with Ollama
        env:
          OLLAMA_MODEL: ${{ steps.ollama.outputs.model }}
        run: |
          python - << 'PY'
          import json
          import os
          import textwrap
          import urllib.request

          with open("pr_meta.txt", "r", encoding="utf-8") as f:
              meta = f.read()
          with open("pr.diff", "r", encoding="utf-8") as f:
              diff = f.read()

          diff_limit = 120000
          if len(diff) > diff_limit:
              diff = diff[:diff_limit] + "\n\n[Diff truncated due to size]"

          prompt = textwrap.dedent(f"""
          You are a senior software reviewer.
          Review this pull request and return concise, actionable feedback in markdown.

          Requirements:
          - Prioritize correctness, regressions, security, and missing tests.
          - If there are no major issues, explicitly say so.
          - Keep it short and practical.
          - Use sections: Summary, Findings, Suggested Next Steps.

          PR metadata:
          {meta}

          Diff:
          {diff}
          """)

          payload = {
              "model": os.environ["OLLAMA_MODEL"],
              "prompt": prompt,
              "stream": False,
          }

          req = urllib.request.Request(
              "http://127.0.0.1:11434/api/generate",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(req, timeout=600) as resp:
              body = json.loads(resp.read().decode("utf-8"))

          content = (body.get("response") or "No review output generated.").strip()

          with open("ai-review-comment.md", "w", encoding="utf-8") as f:
              f.write("## AI Review (Ollama)\n\n")
              f.write(content)
          PY

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file ai-review-comment.md
