name: Auto Publish OrbinexSim Package

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    branches:
      - main
    paths:
      - "orbinexsim-npm/src/**"
      - "orbinexsim-npm/package.json"
      - "orbinexsim-npm/package-lock.json"
      - "orbinexsim-npm/tsconfig.json"
      - "orbinexsim-npm/README.md"
      - ".github/workflows/publish-orbinexsim.yml"

concurrency:
  group: publish-orbinexsim
  cancel-in-progress: false

jobs:
  publish-npm:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    defaults:
      run:
        working-directory: orbinexsim-npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Evaluate publish eligibility
        id: eligibility
        env:
          NPM_AUTOMATION_TOKEN: ${{ secrets.NPM_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$NPM_AUTOMATION_TOKEN" ]; then
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "NPM_AUTOMATION_TOKEN is not configured; publish steps will be skipped."
          else
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.eligibility.outputs.can_publish == 'true'
        run: npm ci

      - name: Build package
        if: steps.eligibility.outputs.can_publish == 'true'
        run: npm run build

      - name: Bump package version
        id: version
        if: steps.eligibility.outputs.can_publish == 'true'
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump }}"
          if [ -z "$BUMP_TYPE" ]; then
            BUMP_TYPE="patch"
          fi
          npm version "$BUMP_TYPE" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing versions on registries
        id: registry_check
        if: steps.eligibility.outputs.can_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          if npm view "@galihru/orbinexsim@${NEW_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "npm_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if npm view "@galihru/orbinexsim@${NEW_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "gh_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "gh_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.eligibility.outputs.can_publish == 'true' && steps.registry_check.outputs.npm_exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTOMATION_TOKEN }}

      - name: Setup Node.js for GitHub Packages
        if: steps.eligibility.outputs.can_publish == 'true' && steps.registry_check.outputs.gh_exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@galihru'

      - name: Publish to GitHub Packages
        if: steps.eligibility.outputs.can_publish == 'true' && steps.registry_check.outputs.gh_exists != 'true'
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip npm publish when version already exists
        if: steps.eligibility.outputs.can_publish == 'true' && steps.registry_check.outputs.npm_exists == 'true'
        run: echo "Skipping npmjs publish because this version already exists."

      - name: Skip GitHub Packages publish when version already exists
        if: steps.eligibility.outputs.can_publish == 'true' && steps.registry_check.outputs.gh_exists == 'true'
        run: echo "Skipping GitHub Packages publish because this version already exists."

      - name: Commit version bump and push tag
        if: steps.eligibility.outputs.can_publish == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore(release): orbinexsim v${NEW_VERSION} [skip ci]"
            git tag "orbinexsim-v${NEW_VERSION}"
            git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
          fi

      - name: Skip note when token is missing
        if: steps.eligibility.outputs.can_publish != 'true'
        run: echo "Skipping npm publish because NPM_AUTOMATION_TOKEN is not configured."
