  <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />

  <script>
    (function () {
      let recovering = false;

      function looksLikeViteEntryScript(src) {
        return /\/assets\/index-[^/]+\.js(?:\?.*)?$/.test(src);
      }

      async function recoverEntryFromManifest() {
        const baseUrl = new URL("%BASE_URL%", window.location.href);
        const manifestUrl = new URL(".vite/manifest.json", baseUrl).toString();
        const response = await fetch(manifestUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Manifest fetch failed");
        }

        const manifest = await response.json();
        const entry = manifest && manifest["index.html"];
        if (!entry || typeof entry.file !== "string") {
          throw new Error("Manifest entry missing");
        }

        if (Array.isArray(entry.css)) {
          entry.css.forEach((cssPath) => {
            if (typeof cssPath !== "string") {
              return;
            }
            const href = new URL(cssPath, baseUrl).toString();
            if (document.querySelector(`link[rel="stylesheet"][href="${href}"]`)) {
              return;
            }
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = href;
            link.crossOrigin = "";
            document.head.appendChild(link);
          });
        }

        const scriptUrl = new URL(entry.file, baseUrl).toString();
        const existingRecoveryScript = Array.from(document.querySelectorAll("script[data-recovery-entry='1']"))
          .find((script) => script instanceof HTMLScriptElement && script.src === scriptUrl);
        if (existingRecoveryScript) {
          return;
        }

        const script = document.createElement("script");
        script.type = "module";
        script.crossOrigin = "";
        script.src = scriptUrl;
        script.setAttribute("data-recovery-entry", "1");
        document.head.appendChild(script);
      }

      window.addEventListener("error", (event) => {
        const target = event.target;
        if (recovering || !(target instanceof HTMLScriptElement)) {
          return;
        }
        if (!looksLikeViteEntryScript(target.src || "")) {
          return;
        }

        recovering = true;
        void recoverEntryFromManifest().catch(() => {
          const retryUrl = new URL(window.location.href);
          retryUrl.searchParams.set("recover", Date.now().toString());
          window.location.replace(retryUrl.toString());
        });
      }, true);
    })();
  </script>

<body>

  <noscript>
    <main id="sim-main" aria-label="Orbinex fallback content">
      <h1>OrbinexSimulation</h1>
      <p>JavaScript diperlukan untuk menjalankan simulasi 3D, mode AR, dan kontrol interaktif Orbinex.</p>
    </main>
  </noscript>
  <orbinex-app id="app"></orbinex-app>
  <script>
    (function () {
      const ua = navigator.userAgent || "";
      const isMobile = /android|iphone|ipad|ipod|windows phone|mobile/i.test(ua);
      if (!isMobile) {
        return;
      }

      const params = new URLSearchParams(window.location.search);
      if (params.get("desktop") === "1") {
        return;
      }

      const pathname = window.location.pathname.toLowerCase();
      if (pathname.endsWith("/ar-view.html") || pathname.endsWith("ar-view.html")) {
        return;
      }

      const baseUrl = new URL(".", window.location.href);
      const targetUrl = new URL("ar-view.html", baseUrl);
      const model = params.get("model");
      if (model) {
        targetUrl.searchParams.set("model", model);
      }
      targetUrl.searchParams.set("from", "mobile-auto");

      window.location.replace(targetUrl.toString());
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
