<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Orbital Formulations Used in OrbinexSimulation</title>
  <desc id="desc">Key equations for gravitational parameter, orbital speed, period, and coordinate projection.</desc>
  <defs>
    <style>
      .bg { fill: #06142d; }
      .card { fill: #0f264b; stroke: #6f9ad6; stroke-width: 2; rx: 18; }
      .h { fill: #e4f0ff; font: 700 26px 'Segoe UI', Arial, sans-serif; }
      .eq { fill: #d2e6ff; font: 600 25px 'Consolas', 'Courier New', monospace; }
      .tx { fill: #aac9f2; font: 500 16px 'Segoe UI', Arial, sans-serif; }
      .small { fill: #90b5e7; font: 500 13px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760" />
  <text class="h" x="40" y="58">Core Orbital Formulations</text>

  <rect class="card" x="40" y="100" width="580" height="180" />
  <text class="h" x="66" y="142">1) Gravitational Parameter</text>
  <text class="eq" x="66" y="188">mu = G * M</text>
  <text class="tx" x="66" y="218">mu: standard gravitational parameter</text>
  <text class="tx" x="66" y="242">G: gravitational constant, M: primary mass</text>

  <rect class="card" x="660" y="100" width="580" height="180" />
  <text class="h" x="686" y="142">2) Circular Orbit Speed</text>
  <text class="eq" x="686" y="188">v = sqrt(mu / r)</text>
  <text class="tx" x="686" y="218">r: orbital radius from the primary center</text>
  <text class="tx" x="686" y="242">Used in quick orbit preview utilities</text>

  <rect class="card" x="40" y="320" width="580" height="180" />
  <text class="h" x="66" y="362">3) Orbital Period</text>
  <text class="eq" x="66" y="408">T = 2 * pi * sqrt(a^3 / mu)</text>
  <text class="tx" x="66" y="438">a: semi-major axis, T: period in seconds</text>
  <text class="tx" x="66" y="462">Converted to days for status reporting</text>

  <rect class="card" x="660" y="320" width="580" height="180" />
  <text class="h" x="686" y="362">4) Equatorial to Cartesian</text>
  <text class="eq" x="686" y="408">x = r cos(d) cos(a), y = r sin(d), z = r cos(d) sin(a)</text>
  <text class="tx" x="686" y="438">a: right ascension, d: declination</text>
  <text class="tx" x="686" y="462">Used when translating astronomical coordinates</text>

  <rect class="card" x="40" y="540" width="1200" height="160" />
  <text class="h" x="66" y="582">5) Visualization Radius Mapping (AR primitives)</text>
  <text class="eq" x="66" y="626">r_vis = clamp((0.08 + log10(max(radius_m, 1)) * 0.04) * scale, 0.03, 0.68)</text>
  <text class="tx" x="66" y="656">Logarithmic compression keeps very large and very small objects simultaneously visible in marker-based AR.</text>

  <text class="small" x="42" y="734">Equation text is intentionally plain to remain fully readable on GitHub and npm markdown renderers.</text>
</svg>
