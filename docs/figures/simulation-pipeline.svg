<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="680" viewBox="0 0 1280 680" role="img" aria-labelledby="title desc">
  <title id="title">Simulation Processing Pipeline</title>
  <desc id="desc">Step-by-step data flow from initialization to reporting and AR output.</desc>
  <defs>
    <style>
      .bg { fill: #07152f; }
      .node { fill: #10264b; stroke: #6d9ad7; stroke-width: 2; rx: 14; }
      .h { fill: #e2eeff; font: 700 22px 'Segoe UI', Arial, sans-serif; }
      .t { fill: #b7d2f7; font: 500 16px 'Segoe UI', Arial, sans-serif; }
      .a { stroke: #97bbee; stroke-width: 2.5; marker-end: url(#ah); }
      .small { fill: #8eb4e5; font: 500 13px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#97bbee" />
    </marker>
  </defs>

  <rect class="bg" width="1280" height="680" />
  <text class="h" x="40" y="52">Scientific Processing Pipeline</text>

  <rect class="node" x="40" y="100" width="260" height="120" />
  <text class="h" x="62" y="140">1) Initialize</text>
  <text class="t" x="62" y="170">Load constants, objects,</text>
  <text class="t" x="62" y="194">and runtime options.</text>

  <rect class="node" x="360" y="100" width="260" height="120" />
  <text class="h" x="382" y="140">2) Propagate</text>
  <text class="t" x="382" y="170">Update positions and velocities</text>
  <text class="t" x="382" y="194">using orbital approximations.</text>

  <rect class="node" x="680" y="100" width="260" height="120" />
  <text class="h" x="702" y="140">3) Detect</text>
  <text class="t" x="702" y="170">Close approaches, impacts,</text>
  <text class="t" x="702" y="194">and transient phenomena.</text>

  <rect class="node" x="1000" y="100" width="240" height="120" />
  <text class="h" x="1022" y="140">4) Forecast</text>
  <text class="t" x="1022" y="170">Compute event ETA and</text>
  <text class="t" x="1022" y="194">confidence score.</text>

  <rect class="node" x="140" y="330" width="300" height="130" />
  <text class="h" x="164" y="372">5) Render Desktop</text>
  <text class="t" x="164" y="402">Three.js scene, orbit trails,</text>
  <text class="t" x="164" y="426">labels, and UI diagnostics.</text>

  <rect class="node" x="500" y="330" width="300" height="130" />
  <text class="h" x="524" y="372">6) Render AR</text>
  <text class="t" x="524" y="402">Marker tracking, object mapping,</text>
  <text class="t" x="524" y="426">permission-aware runtime.</text>

  <rect class="node" x="860" y="330" width="300" height="130" />
  <text class="h" x="884" y="372">7) Report</text>
  <text class="t" x="884" y="402">State report, event log,</text>
  <text class="t" x="884" y="426">recommendation feed.</text>

  <line class="a" x1="300" y1="160" x2="360" y2="160" />
  <line class="a" x1="620" y1="160" x2="680" y2="160" />
  <line class="a" x1="940" y1="160" x2="1000" y2="160" />

  <line class="a" x1="1120" y1="220" x2="1000" y2="330" />
  <line class="a" x1="820" y1="220" x2="650" y2="330" />
  <line class="a" x1="520" y1="220" x2="300" y2="330" />

  <line class="a" x1="440" y1="395" x2="500" y2="395" />
  <line class="a" x1="800" y1="395" x2="860" y2="395" />

  <text class="small" x="40" y="620">Sampling loop: dt_eff = baseDtSeconds * timeScale</text>
  <text class="small" x="40" y="642">Forecast heuristic: eta ~= distance / relativeSpeed, confidence = clamp(0.45 + 0.5 / (1 + distance/AU), 0.45, 0.98)</text>
</svg>
