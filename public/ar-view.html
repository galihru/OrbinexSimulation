                return body;
            }

            rawCatalog.forEach(registerBody);

            function getBody(name) {
                return catalogByName.get(name) || null;
            }

            function inferParentForFallback(kind) {
                if (kind === "moon") return "Bumi";
                if (kind === "planet" || kind === "dwarf" || kind === "comet" || kind === "meteor") return "Matahari";
                if (kind === "star" || kind === "black-hole" || kind === "nebula") return "Bima Sakti";
                if (kind === "galaxy") return "Grup Lokal";
                if (kind === "cluster") return "Laniakea";
                return "Matahari";
            }

            function computeOrbitalPeriodDays(semiMajorMeters, parentMassKg) {
                const a = Math.max(semiMajorMeters, 1);
                const mu = G * Math.max(parentMassKg, 1);
                const sec = TAU * Math.sqrt((a * a * a) / mu);
                return clamp(sec / DAY_SECONDS, 0.05, 2.0e12);
            }

            function ensureBodyDefaults(body) {
                if (!body.color) body.color = defaultColorForKind(body.kind);
                if (!Number.isFinite(body.radiusMeters) || body.radiusMeters <= 0) {
                    body.radiusMeters = defaultRadiusForKind(body.kind);
                }
                if (!Number.isFinite(body.massKg) || body.massKg <= 0) {
                    body.massKg = defaultMassForKind(body.kind);
                }
                if (!Number.isFinite(body.rotationHours) || Math.abs(body.rotationHours) < 0.01) {
                    body.rotationHours = defaultRotationHours(body.kind);
                }

                if (body.parentName) {
                    const parent = getBody(body.parentName);
                    if (parent) {
                        if (!Number.isFinite(body.semiMajorMeters) || body.semiMajorMeters <= 0) {
                            const baseline = parent.radiusMeters * seededRange(body.name, 3.2, 44, 91);
                            body.semiMajorMeters = Math.max(baseline, parent.radiusMeters * 2.2);
                        }

                        if (!Number.isFinite(body.periodDays) || body.periodDays <= 0) {
                            body.periodDays = computeOrbitalPeriodDays(body.semiMajorMeters, parent.massKg + body.massKg);
                        }
                    }
                }
            }

            function createFallbackBody(rawName) {
                const cleanedName = (rawName || "Unknown Object").trim() || "Unknown Object";
                const kind = inferKindFromName(cleanedName);

                let parentName = inferParentForFallback(kind);
                const parentPrefixMatch = cleanedName.match(/^(.+?)\s+(Minor Moon|Meteoroid|Comet|Meteor)-\d+$/i);
                if (parentPrefixMatch && getBody(parentPrefixMatch[1].trim())) {
                    parentName = parentPrefixMatch[1].trim();
                }

                const fallback = registerBody({
                    name: cleanedName,
                    kind,
                    massKg: defaultMassForKind(kind) * seededRange(cleanedName, 0.65, 1.35, 17),
                    radiusMeters: defaultRadiusForKind(kind) * seededRange(cleanedName, 0.62, 1.28, 33),
                    color: defaultColorForKind(kind),
                    parentName,
                    semiMajorMeters: null,
                    periodDays: null,
                    rotationHours: defaultRotationHours(kind) * seededRange(cleanedName, 0.7, 1.3, 49),
                    inclinationDeg: seededRange(cleanedName, 0, 35, 73),
                });

                ensureBodyDefaults(fallback);
                return fallback;
            }

            function resolveBodyByName(name) {
                const query = (name || "").trim();
                if (!query) {
                    return getBody("Bumi");
                }

                const direct = getBody(query);
                if (direct) {
                    ensureBodyDefaults(direct);
                    return direct;
                }

                const normalized = normalizeKey(query);
                const loose = normalizeLooseKey(query);
                const aliasTarget = aliasMap.get(normalized) || aliasMap.get(loose);
                if (aliasTarget && getBody(aliasTarget)) {
                    const aliasBody = getBody(aliasTarget);
                    ensureBodyDefaults(aliasBody);
                    return aliasBody;
                }

                const byNormalized = normalizedNameIndex.get(normalized) || normalizedNameIndex.get(loose);
                if (byNormalized && getBody(byNormalized)) {
                    const normalizedBody = getBody(byNormalized);
                    ensureBodyDefaults(normalizedBody);
                    return normalizedBody;
                }

                return createFallbackBody(query);
            }

            function getChildren(parentName) {
                const children = [];
                for (const body of catalogByName.values()) {
                    if (body.parentName === parentName) {
                        ensureBodyDefaults(body);
                        children.push(body);
                    }
                }
                return children;
            }

            function sortByOrbit(a, b) {
                const sa = Number.isFinite(a.semiMajorMeters) ? a.semiMajorMeters : Number.MAX_SAFE_INTEGER;
                const sb = Number.isFinite(b.semiMajorMeters) ? b.semiMajorMeters : Number.MAX_SAFE_INTEGER;
                if (sa !== sb) {
                    return sa - sb;
                }
                return a.name.localeCompare(b.name);
            }

            function neighborhoodByFocus(items, focusName, count) {
                if (items.length <= count) {
                    return items;
                }
                const idx = items.findIndex((entry) => entry.name === focusName);
                if (idx < 0) {
                    return items.slice(0, count);
                }
                const half = Math.floor(count / 2);
                let start = Math.max(0, idx - half);
                if (start + count > items.length) {
                    start = Math.max(0, items.length - count);
                }
                return items.slice(start, start + count);
            }

            function buildDisplayBodies(focusBody) {
                const rootBody = focusBody;

                ensureBodyDefaults(focusBody);
                ensureBodyDefaults(rootBody);

                const included = new Map();
                const addBody = (body) => {
                    if (!body || included.has(body.name)) {
                        return;
                    }
                    ensureBodyDefaults(body);
                    included.set(body.name, body);
                };

                addBody(rootBody);
                addBody(focusBody);

                const focusChildren = getChildren(focusBody.name).sort(sortByOrbit);
                focusChildren.forEach(addBody);

                const bodies = Array.from(included.values());
                return { rootBody, focusBody, bodies };
            }

            function depthFromRoot(body, rootName) {
                let depth = 0;
                let cursor = body;
                let guard = 0;
                while (cursor && cursor.name !== rootName && guard < 48) {
                    const parent = cursor.parentName ? getBody(cursor.parentName) : null;
                    if (!parent) {
                        depth += 1;
                        break;
                    }
                    depth += 1;
                    cursor = parent;
                    guard += 1;
                }
                return depth;
            }

            function createEntity(tagName, attrs) {
                const el = document.createElement(tagName);
                if (attrs) {
                    Object.keys(attrs).forEach((key) => {
                        el.setAttribute(key, attrs[key]);
                    });
                }
                return el;
            }

            function attachTextureErrorFallback(entityEl, fallbackMaterial) {
                if (!entityEl) {
                    return;
                }

                entityEl.addEventListener("materialtextureerror", () => {
                    entityEl.setAttribute("material", fallbackMaterial);
                }, { once: true });
            }

            function isRingedBody(bodyName) {
                return bodyName === "Saturnus" || bodyName === "Uranus";
            }

            function displayRadiusForBody(body, parentNode, focusName) {
                const logRadius = Math.log10(Math.max(body.radiusMeters, 1));
                let base;

                if (body.kind === "star") {
                    base = clamp(0.28 + (logRadius - 6.0) * 0.16, 0.26, 0.54);
                } else if (body.kind === "black-hole") {
                    base = clamp(0.24 + (logRadius - 7.0) * 0.12, 0.22, 0.46);
                } else if (body.kind === "planet" || body.kind === "dwarf") {
                    base = clamp(0.12 + (logRadius - 5.5) * 0.08, 0.08, 0.33);
                } else if (body.kind === "moon") {
                    base = clamp(0.08 + (logRadius - 5.0) * 0.06, 0.05, 0.24);
                } else if (body.kind === "galaxy") {
                    base = clamp(0.38 + (logRadius - 20.0) * 0.05, 0.34, 0.58);
                } else if (body.kind === "cluster" || body.kind === "nebula") {
                    base = clamp(0.34 + (logRadius - 19.0) * 0.05, 0.3, 0.55);
                } else if (body.kind === "comet" || body.kind === "meteor") {
                    base = clamp(0.06 + (logRadius - 4.0) * 0.05, 0.04, 0.16);
                } else {
                    base = clamp(0.11 + (logRadius - 5.5) * 0.07, 0.07, 0.26);
                }

                let radius = base;
                if (parentNode) {
                    const parentPhysical = Math.max(parentNode.body.radiusMeters, 1);
                    const ratio = Math.max(body.radiusMeters / parentPhysical, 1e-6);
                    const relative = parentNode.displayRadius * Math.pow(ratio, 0.5) * 0.95;
                    const min = parentNode.displayRadius * (body.kind === "moon" ? 0.1 : 0.08);
                    const max = parentNode.displayRadius * (body.kind === "moon" ? 0.52 : 0.68);
                    radius = clamp(radius * 0.34 + relative * 0.66, min, max);
                }

                if (body.name === focusName) {
                    radius *= 1.08;
                }

                return clamp(radius, 0.03, 0.62);
            }

            function orbitRadiusForBody(body, parentNode) {
                const parentBody = parentNode.body;
                const semiMajor = Math.max(body.semiMajorMeters || parentBody.radiusMeters * 8, parentBody.radiusMeters * 2.2);

                const base = parentBody.kind === "star"
                    ? 0.55 + Math.log10(semiMajor / 2e9 + 1) * 0.52
                    : parentBody.kind === "planet"
                        ? 0.28 + Math.log10(semiMajor / 2e6 + 1) * 0.33
                        : 0.34 + Math.log10(semiMajor / 5e8 + 1) * 0.42;

                const min = Math.max(parentNode.displayRadius * 2.4, 0.26);
                const max = parentBody.kind === "star"
                    ? 2.95
                    : parentBody.kind === "planet"
                        ? 1.36
                        : 1.9;

                return clamp(Math.max(base, min), min, max);
            }

            function appearanceForBody(body, displayRadius) {
                const kind = body.kind;
                const visualProfile = visualProfileByName.get(body.name);
                const useBodyTexture = body.name === "Bumi" && !!(visualProfile && visualProfile.texture);

                if (useBodyTexture && visualProfile && visualProfile.texture) {
                    const materialParts = [
                        "shader: flat",
                        `color: ${body.color}`,
                        `src: ${visualProfile.texture}`,
                        "side: double",
                        "depthTest: false",
                        "depthWrite: false",
                    ];

                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: materialParts.join("; "),
                    };
                }

                if (kind === "meteor") {
                    return {
                        geometry: `primitive: dodecahedron; radius: ${displayRadius.toFixed(4)}`,
                        material: `shader: flat; color: ${body.color}; side: double; depthTest: false; depthWrite: false`,
                    };
                }
                if (kind === "comet") {
                    return {
                        geometry: `primitive: icosahedron; radius: ${displayRadius.toFixed(4)}`,
                        material: `shader: flat; color: ${body.color}; side: double; depthTest: false; depthWrite: false`,
                    };
                }
                if (kind === "black-hole") {
                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: "shader: flat; color: #191a2d; side: double; depthTest: false; depthWrite: false",
                    };
                }
                if (kind === "galaxy") {
                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: `shader: flat; color: ${body.color}; opacity: 0.7; transparent: true; side: double; depthTest: false; depthWrite: false`,
                    };
                }
                if (kind === "nebula") {
                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: `shader: flat; color: ${body.color}; opacity: 0.62; transparent: true; side: double; depthTest: false; depthWrite: false`,
                    };
                }
                if (kind === "star") {
                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: `shader: flat; color: ${body.color}; side: double; depthTest: false; depthWrite: false`,
                    };
                }
                return {
                    geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                    material: `shader: flat; color: ${body.color}; side: double; depthTest: false; depthWrite: false`,
                };
            }

            function createBodyNode(body, parentNode, focusName, rootContainer) {
                const orbitAnchorEl = createEntity("a-entity", { position: "0 0 0" });
                const parentContainer = parentNode ? parentNode.orbitAnchorEl : rootContainer;
                parentContainer.appendChild(orbitAnchorEl);

                const displayRadius = displayRadiusForBody(body, parentNode, focusName);
                const appearance = appearanceForBody(body, displayRadius);
                const visualProfile = visualProfileByName.get(body.name) || null;

                const bodyMeshEl = createEntity("a-entity", {
                    geometry: appearance.geometry,
                    material: appearance.material,
                    position: "0 0 0",
                });
                orbitAnchorEl.appendChild(bodyMeshEl);

                if (body.name === "Bumi" && visualProfile && visualProfile.texture) {
                    attachTextureErrorFallback(bodyMeshEl, `shader: flat; color: ${body.color}; side: double; depthTest: false; depthWrite: false`);
                }

                let atmosphereEl = null;
                if (body.name === "Bumi") {
                    atmosphereEl = createEntity("a-entity", {
                        geometry: `primitive: sphere; radius: ${(displayRadius * 1.024).toFixed(4)}`,
                        material: "shader: flat; color: #dff1ff; opacity: 0.24; transparent: true; side: double; depthTest: false; depthWrite: false",
                        position: "0 0 0",
                    });
                    orbitAnchorEl.appendChild(atmosphereEl);
                }

                let cloudLayerEl = null;
                if (visualProfile && visualProfile.cloudTexture) {
                    cloudLayerEl = createEntity("a-entity", {
                        geometry: `primitive: sphere; radius: ${(displayRadius * 1.016).toFixed(4)}`,
                        material: `shader: flat; src: ${visualProfile.cloudTexture}; color: #ffffff; opacity: 0.62; transparent: true; side: double; depthTest: false; depthWrite: false`,
                        position: "0 0 0",
                    });
                    orbitAnchorEl.appendChild(cloudLayerEl);
                    attachTextureErrorFallback(cloudLayerEl, "shader: flat; color: #ffffff; opacity: 0.28; transparent: true; side: double; depthTest: false; depthWrite: false");
                }

                let glowEl = null;
                if (body.kind === "star") {
                    glowEl = createEntity("a-entity", {
                        geometry: `primitive: sphere; radius: ${(displayRadius * 1.2).toFixed(4)}`,
                        material: `shader: flat; color: ${body.color}; opacity: 0.24; transparent: true; side: double; depthTest: false; depthWrite: false`,
                    });
                    orbitAnchorEl.appendChild(glowEl);
                }

                let cometTailEl = null;
                if (body.kind === "comet") {
                    cometTailEl = createEntity("a-entity", {
                        geometry: `primitive: cone; radiusBottom: ${(displayRadius * 0.7).toFixed(4)}; radiusTop: ${(displayRadius * 0.08).toFixed(4)}; height: ${(displayRadius * 4.2).toFixed(4)}`,
                        material: "shader: flat; color: #dcecff; opacity: 0.38; transparent: true; side: double; depthTest: false; depthWrite: false",
                        position: `0 0 ${(-displayRadius * 2.5).toFixed(4)}`,
                        rotation: "-90 0 0",
                    });
                    orbitAnchorEl.appendChild(cometTailEl);
                }

                if (isRingedBody(body.name)) {
                    const hasRingTexture = false;
                    const ringMaterial = hasRingTexture
                        ? `shader: flat; src: ${visualProfile.ringTexture}; color: #d7c08f; opacity: 0.82; transparent: true; side: double; depthTest: false; depthWrite: false`
                        : "shader: flat; color: #bcd4d8; opacity: 0.34; transparent: true; side: double; depthTest: false; depthWrite: false";
                    const ringEl = createEntity("a-entity", {
                        geometry: `primitive: ring; radiusInner: ${(displayRadius * 1.42).toFixed(4)}; radiusOuter: ${(displayRadius * 2.06).toFixed(4)}; segmentsTheta: 96`,
                        material: ringMaterial,
                        rotation: "-90 10 0",
                    });
                    orbitAnchorEl.appendChild(ringEl);
                    if (hasRingTexture) {
                        attachTextureErrorFallback(ringEl, "shader: flat; color: #bcd4d8; opacity: 0.34; transparent: true; side: double; depthTest: false; depthWrite: false");
                    }
                }

                if (body.kind === "black-hole") {
                    const accretionEl = createEntity("a-entity", {
                        geometry: `primitive: torus; radius: ${(displayRadius * 1.58).toFixed(4)}; radiusTubular: ${(displayRadius * 0.21).toFixed(4)}; segmentsTubular: 72; segmentsRadial: 12`,
                        material: "shader: flat; color: #7c8dff; opacity: 0.62; transparent: true; side: double; depthTest: false; depthWrite: false",
                        rotation: "90 0 0",
                    });
                    orbitAnchorEl.appendChild(accretionEl);
                }

                if (body.kind === "galaxy") {
                    const diskEl = createEntity("a-entity", {
                        geometry: `primitive: torus; radius: ${(displayRadius * 1.42).toFixed(4)}; radiusTubular: ${(displayRadius * 0.26).toFixed(4)}; segmentsTubular: 92; segmentsRadial: 14`,
                        material: `shader: flat; color: ${body.color}; opacity: 0.36; transparent: true; side: double; depthTest: false; depthWrite: false`,
                        rotation: "88 0 0",
                    });
                    orbitAnchorEl.appendChild(diskEl);
                }

                const label = createEntity("a-text", {
                    value: body.name === focusName ? `${displayBodyName(body.name)} [focus]` : displayBodyName(body.name),
                    align: "center",
                    color: body.name === focusName ? "#eaf4ff" : "#c8daff",
                    position: `0 ${(displayRadius * 1.9).toFixed(4)} 0`,
                    side: "double",
                    width: "2.6",
                    scale: "0.58 0.58 0.58",
                });
                orbitAnchorEl.appendChild(label);

                let orbitRadius = 0;
                let orbitTrackEl = null;
                if (parentNode) {
                    orbitRadius = orbitRadiusForBody(body, parentNode);
                    if (parentNode.body.name !== focusName) {
                        orbitTrackEl = createEntity("a-entity", {
                            geometry: `primitive: ring; radiusInner: ${(orbitRadius - 0.003).toFixed(4)}; radiusOuter: ${(orbitRadius + 0.003).toFixed(4)}; segmentsTheta: 96`,
                            material: "shader: flat; color: #7ea8e6; opacity: 0.24; transparent: true; side: double; depthTest: false; depthWrite: false",
                            rotation: "-90 0 0",
                            position: "0 0 0",
                        });
                        parentNode.orbitAnchorEl.appendChild(orbitTrackEl);
                    }
                }

                const orbitDirectionSign = body.name === "Venus" ? -1 : 1;
                const orbitOmega = parentNode && body.periodDays
                    ? orbitDirectionSign * TAU / Math.max(body.periodDays * DAY_SECONDS, 1)
                    : 0;
                const spinOmega = TAU / Math.max(Math.abs(body.rotationHours || 30) * 3600, 1);

                return {
                    body,
                    parentNode,
                    orbitAnchorEl,
                    bodyMeshEl,
                    labelEl: label,
                    atmosphereEl,
                    cloudLayerEl,
                    glowEl,
                    cometTailEl,
                    orbitTrackEl,
                    displayRadius,
                    orbitRadius,
                    orbitOmega,
                    spinOmega,
                    spinSign: (body.rotationHours || 1) < 0 ? -1 : 1,
                    phase: seededRange(body.name, 0, TAU, 109),
                    inclinationRad: ((Number.isFinite(body.inclinationDeg) ? body.inclinationDeg : seededRange(body.name, 0, 15, 113)) * Math.PI) / 180,
                    pulseSeed: seededRange(body.name, 0, TAU, 127),
                };
            }

            function buildArSystem(focusBody) {
                if (!modelRoot) {
                    return {
                        rootBody: focusBody,
                        focusBody,
                        nodes: [],
                        nodeByName: new Map(),
                        rootContainer: null,
                    };
                }

                modelRoot.innerHTML = "";

                const system = buildDisplayBodies(focusBody);
                const rootContainer = createEntity("a-entity", { position: "0 0.38 0" });
                modelRoot.appendChild(rootContainer);

                const nodes = [];
                const nodeByName = new Map();

                const orderedBodies = system.bodies.slice().sort((a, b) => {
                    const depthA = depthFromRoot(a, system.rootBody.name);
                    const depthB = depthFromRoot(b, system.rootBody.name);
                    if (depthA !== depthB) {
                        return depthA - depthB;
                    }
                    return sortByOrbit(a, b);
                });

                for (const body of orderedBodies) {
                    let parentNode = null;
                    if (body.name !== system.rootBody.name) {
                        parentNode = body.parentName ? nodeByName.get(body.parentName) || null : null;
                        if (!parentNode) {
                            parentNode = nodeByName.get(system.rootBody.name) || null;
                        }
                    }

                    const node = createBodyNode(body, parentNode, system.focusBody.name, rootContainer);
                    nodes.push(node);
                    nodeByName.set(body.name, node);
                }

                return {
                    rootBody: system.rootBody,
                    focusBody: system.focusBody,
                    nodes,
                    nodeByName,
                    rootContainer,
                };
            }

            let orbitDaysPerSecond = clamp(Number(speedRange.value) || 2.5, 0.05, 24);
            speedValue.textContent = `${orbitDaysPerSecond.toFixed(2)} days/sec`;

            let currentFocusBody = resolveBodyByName(requestedModel);
            arSystem = null;

            function updateSystemMeta(markerLabel) {
                if (!arSystem) {
                    return;
                }

                const label = markerLabel || (activeMarkerEl && activeMarkerEl.dataset.markerLabel) || "QR/Hiro";
                systemMetaEl.textContent = `Marker: ${label} | Root: ${displayBodyName(arSystem.rootBody.name)} | Focus: ${displayBodyName(arSystem.focusBody.name)} | AR Nodes: ${arSystem.nodes.length}`;
            }

            function setActiveFocusByName(bodyName, markerLabel) {
                if (!modelRoot) {
                    return;
                }

                currentFocusBody = resolveBodyByName(bodyName || requestedModel);
                modelNameEl.textContent = displayBodyName(currentFocusBody.name);
                const updatedUrl = new URL(window.location.href);
                updatedUrl.searchParams.set("model", currentFocusBody.name);
                window.history.replaceState({}, "", updatedUrl.toString());
                desktopUrl.searchParams.set("model", currentFocusBody.name);
                openDesktopLink.href = desktopUrl.toString();
                arSystem = buildArSystem(currentFocusBody);
                if (arLowLagModeActive) {
                    optimizeArNodesForLowLag();
                }
                applyViewTransform();
                updateSystemMeta(markerLabel);
            }

            function modelRootFromMarker(markerNode) {
                if (!markerNode) {
                    return null;
                }
                return markerNode.querySelector("[data-model-root]");
            }

            function resolveMarkerModelName(markerNode) {
                if (orbinexsimRuntimeModule && typeof orbinexsimRuntimeModule.resolveObjectNameForMarker === "function") {
                    return orbinexsimRuntimeModule.resolveObjectNameForMarker(markerNode, requestedModel);
                }

                return (markerNode && markerNode.dataset && markerNode.dataset.model || requestedModel || "Earth").trim();
            }

            function activateMarker(markerNode) {
                if (!markerNode) {
                    return;
                }

                const nextRoot = modelRootFromMarker(markerNode);
                if (!nextRoot) {
                    return;
                }

                const rootChanged = modelRoot !== nextRoot;
                if (rootChanged && modelRoot) {
                    modelRoot.innerHTML = "";
                }

                modelRoot = nextRoot;
                activeMarkerEl = markerNode;
                setMarkerHint(markerNode);
                const markerLabel = markerNode.dataset.markerLabel || markerNode.id || "marker";
                const markerModel = resolveMarkerModelName(markerNode);
                const focusChanged = !arSystem || !currentFocusBody || currentFocusBody.name !== resolveBodyByName(markerModel).name;

                if (rootChanged || focusChanged) {
                    setActiveFocusByName(markerModel, markerLabel);
                }

                statusEl.textContent = `Marker ${markerLabel} detected. Showing ${displayBodyName(currentFocusBody.name)}.`;
            }

            let viewScale = 1;
            let viewRotX = -0.16;
            let viewRotY = 0.34;

            function applyViewTransform() {
                if (!modelRoot || !modelRoot.object3D) {
                    return;
                }
                const obj = modelRoot.object3D;
                obj.position.set(0, 0.38, 0);
                obj.scale.setScalar(viewScale);
                obj.rotation.set(viewRotX, viewRotY, 0);
            }

            function zoomBy(factor) {
                viewScale = clamp(viewScale * factor, 0.45, 2.8);
                applyViewTransform();
            }

            function resetView() {
                viewScale = 1;
                viewRotX = -0.16;
                viewRotY = 0.34;
                applyViewTransform();
            }

            setActiveFocusByName(requestedModel, (activeMarkerEl && activeMarkerEl.dataset.markerLabel) || "QR/Hiro");
            statusEl.textContent = "Enable camera access, scan a Hiro/Kanji marker, then use drag/pinch for rotation and zoom.";
            void applyCatalogProxyFromRuntimeModule();

            zoomInButton.addEventListener("click", () => zoomBy(1.12));
            zoomOutButton.addEventListener("click", () => zoomBy(0.9));
            rotLeftButton.addEventListener("click", () => {
                viewRotY -= 0.18;
                applyViewTransform();
            });
            rotRightButton.addEventListener("click", () => {
                viewRotY += 0.18;
                applyViewTransform();
            });
            viewResetButton.addEventListener("click", resetView);

            speedRange.addEventListener("input", () => {
                orbitDaysPerSecond = clamp(Number(speedRange.value) || 2.5, 0.05, 24);
                speedValue.textContent = `${orbitDaysPerSecond.toFixed(2)} days/sec`;

                if (orbitDaysPerSecond > 14) {
                    statusEl.textContent = `Speed ${orbitDaysPerSecond.toFixed(2)} days/sec: chaos visual mode active (orbits become unstable).`;
                }
            });

            let markerDetected = false;
            let cameraReady = false;

            function cameraVideoElement() {
                const byId = document.getElementById("arjs-video");
                if (byId && byId !== pipCameraVideo) {
                    byId.classList.add("ar-main-video");
                    return byId;
                }

                const byClass = document.querySelector("video.arjs-video:not(#pip-camera-video), video.ar-main-video:not(#pip-camera-video)");
                if (byClass) {
                    byClass.classList.add("ar-main-video");
                    return byClass;
                }

                const candidates = Array.from(document.querySelectorAll("video:not(#pip-camera-video)"));
                if (!candidates.length) {
                    return null;
                }

                candidates.sort((a, b) => {
                    const areaA = (Number(a.videoWidth) || 0) * (Number(a.videoHeight) || 0);
                    const areaB = (Number(b.videoWidth) || 0) * (Number(b.videoHeight) || 0);
                    return areaB - areaA;
                });

                const mainVideo = candidates[0];
                mainVideo.classList.add("ar-main-video");
                return mainVideo;
            }

            function updateCameraReadyStatus() {
                const video = cameraVideoElement();
                if (!video) {
                    return false;
                }

                video.setAttribute("playsinline", "true");
                video.setAttribute("webkit-playsinline", "true");
                applyMainVideoLayer();
                applySceneCanvasLayout();
                syncPipCameraStream();

                if (video.readyState >= 2 || (video.videoWidth > 0 && video.videoHeight > 0)) {
                    if (!cameraReady) {
                        cameraReady = true;
                        autoCloseSheetAfterCameraReady();
                        if (!markerDetected) {
                            statusEl.textContent = "Camera is active. Point to a Hiro/Kanji marker (25-60% of screen area) to render the model.";
                        }
                    }
                    return true;
                }

                return false;
            }

            function handleCameraInit() {
                cameraReady = true;
                applyMainVideoLayer();
                applySceneCanvasLayout();
                syncPipCameraStream();
                bindArMiniSwapTarget();
                autoCloseSheetAfterCameraReady();
                if (!markerDetected) {
                    statusEl.textContent = "AR camera initialized. Point to the object marker now.";
                }
            }

            function handleCameraError() {
                statusEl.textContent = "Failed to open camera. Ensure camera permission is granted and the browser supports WebRTC.";
            }

            window.addEventListener("camera-init", handleCameraInit);
            sceneEl.addEventListener("camera-init", handleCameraInit);
            window.addEventListener("camera-error", handleCameraError);
            sceneEl.addEventListener("camera-error", handleCameraError);

            sceneEl.addEventListener("loaded", () => {
                applyMainVideoLayer();
                applySceneCanvasLayout();
                bindArMiniSwapTarget();
                statusEl.textContent = "AR scene ready. Waiting for camera and Hiro/Kanji marker.";
            });

            sceneEl.addEventListener("renderstart", () => {
                applyMainVideoLayer();
                applySceneCanvasLayout();
                bindArMiniSwapTarget();
                updateCameraReadyStatus();
            });

            window.addEventListener("resize", () => {
                applyMainVideoLayer();
                applySceneCanvasLayout();
            });

            document.addEventListener("visibilitychange", () => {
                if (!document.hidden && arLowLagModeActive) {
                    void requestScreenWakeLockPermission();
                }
            });

            let cameraPollTick = 0;
            const cameraPoll = window.setInterval(() => {
                cameraPollTick += 1;
                const ready = updateCameraReadyStatus();
                if (ready || cameraPollTick > 40) {
                    window.clearInterval(cameraPoll);
                }
            }, 400);

            window.setTimeout(() => {
                if (!cameraReady) {
                    statusEl.textContent = "Camera is not active yet. Check browser camera permission, then reload the AR page.";
                    return;
                }
                if (!markerDetected) {
                    statusEl.textContent = "Camera is active, but no marker detected yet. Move closer to the marker and avoid blur/reflections.";
                }
            }, 12000);

            const activePointers = new Map();
            let pinchDistance = 0;

            function pointerDistance(points) {
                if (points.length < 2) {
                    return 0;
                }
                return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
            }

            gesturePad.addEventListener("pointerdown", (event) => {
                activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
                gesturePad.setPointerCapture(event.pointerId);
                if (activePointers.size === 2) {
                    pinchDistance = pointerDistance(Array.from(activePointers.values()));
                }
            });

            gesturePad.addEventListener("pointermove", (event) => {
                const prev = activePointers.get(event.pointerId);
                if (!prev) {
                    return;
                }

                const next = { x: event.clientX, y: event.clientY };
                activePointers.set(event.pointerId, next);

                if (activePointers.size === 1) {
                    const dx = next.x - prev.x;
                    const dy = next.y - prev.y;
                    viewRotY += dx * 0.008;
                    viewRotX = clamp(viewRotX + dy * 0.005, -0.55, 0.55);
                    applyViewTransform();
                    return;
                }

                if (activePointers.size === 2) {
                    const points = Array.from(activePointers.values());
                    const dist = pointerDistance(points);
                    if (pinchDistance > 0 && dist > 0) {
                        zoomBy(Math.pow(dist / pinchDistance, 1.02));
                    }
                    pinchDistance = dist;
                }
            });

            function releasePointer(pointerId) {
                activePointers.delete(pointerId);
                if (activePointers.size < 2) {
                    pinchDistance = 0;
                }
            }

            gesturePad.addEventListener("pointerup", (event) => releasePointer(event.pointerId));
            gesturePad.addEventListener("pointercancel", (event) => releasePointer(event.pointerId));
            gesturePad.addEventListener("pointerleave", (event) => releasePointer(event.pointerId));

            gesturePad.addEventListener("wheel", (event) => {
                event.preventDefault();
                zoomBy(event.deltaY < 0 ? 1.08 : 0.92);
            }, { passive: false });

            applyViewTransform();

            let lastFrameMs = performance.now();
            function animateFrame(nowMs) {
                const dtSec = clamp((nowMs - lastFrameMs) / 1000, 0, 0.08);
                lastFrameMs = nowMs;

                if (!arSystem) {
                    requestAnimationFrame(animateFrame);
                    return;
                }

                const simSec = dtSec * orbitDaysPerSecond * DAY_SECONDS;
                const chaosIntensity = clamp((orbitDaysPerSecond - 14) / 10, 0, 1);
                for (const node of arSystem.nodes) {
                    if (node.parentNode && node.orbitOmega > 0 && node.orbitRadius > 0) {
                        node.phase = (node.phase + node.orbitOmega * simSec) % TAU;
                        const cosP = Math.cos(node.phase);
                        const sinP = Math.sin(node.phase);
                        const wobble = chaosIntensity > 0
                            ? Math.sin(nowMs * 0.006 + node.pulseSeed) * node.orbitRadius * 0.12 * chaosIntensity
                            : 0;
                        const x = node.orbitRadius * cosP + wobble;
                        const zPlane = node.orbitRadius * sinP;
                        const yRaw = zPlane * Math.sin(node.inclinationRad);
                        const y = Math.max(yRaw, -0.06);
                        const z = zPlane * Math.cos(node.inclinationRad);
                        node.orbitAnchorEl.object3D.position.set(x, y, z);
                    }

                    node.bodyMeshEl.object3D.rotation.y += node.spinSign * node.spinOmega * simSec;

                    if (node.cloudLayerEl) {
                        node.cloudLayerEl.object3D.rotation.y += node.spinSign * node.spinOmega * simSec * 1.05;
                    }

                    if (chaosIntensity > 0.86 && node.body.kind !== "star") {
                        const pulse = 1 + Math.sin(nowMs * 0.04 + node.pulseSeed) * 0.1 * chaosIntensity;
                        node.bodyMeshEl.object3D.scale.setScalar(pulse);
                    } else {
                        node.bodyMeshEl.object3D.scale.set(1, 1, 1);
                    }

                    if (node.glowEl) {
                        const glowScale = 1 + Math.sin(nowMs / 520 + node.pulseSeed) * 0.04;
                        node.glowEl.object3D.scale.setScalar(glowScale);
                    }

                    if (node.cometTailEl) {
                        node.cometTailEl.object3D.rotation.y += 0.09 * dtSec;
                    }

                    if (node.labelEl && node.labelEl.object3D && sceneEl.camera && cameraWorldPosition) {
                        node.labelEl.object3D.lookAt(sceneEl.camera.getWorldPosition(cameraWorldPosition));
                        node.labelEl.object3D.rotation.x = 0;
                        node.labelEl.object3D.rotation.z = 0;
                    }
                }

                requestAnimationFrame(animateFrame);
            }
            requestAnimationFrame(animateFrame);

            function bindFallbackMarkerTracking() {
                markerVisibilityState.clear();
                const disposers = [];

                markerEls.forEach((markerNode, index) => {
                    const markerId = markerNode.id || `marker-${index + 1}`;
                    markerVisibilityState.set(markerId, false);

                    const onFound = () => {
                        markerVisibilityState.set(markerId, true);
                        markerDetected = true;
                        activateMarker(markerNode);
                    };

                    const onLost = () => {
                        markerVisibilityState.set(markerId, false);
                        markerDetected = Array.from(markerVisibilityState.values()).some(Boolean);

                        if (!markerDetected) {
                            statusEl.textContent = "Marker lost. Point the camera back to the marker to show the model again.";
                        }
                    };

                    markerNode.addEventListener("markerFound", onFound);
                    markerNode.addEventListener("markerLost", onLost);

                    disposers.push(() => {
                        markerNode.removeEventListener("markerFound", onFound);
                        markerNode.removeEventListener("markerLost", onLost);
                    });
                });

                return () => {
                    disposers.forEach((dispose) => dispose());
                };
            }

            async function bindMarkerTrackingHandlers() {
                if (typeof stopMarkerTracking === "function") {
                    stopMarkerTracking();
                    stopMarkerTracking = null;
                }

                refreshMarkerReferences();

                try {
                    const runtimeModule = await loadOrbinexsimRuntimeModule();
                    if (runtimeModule && typeof runtimeModule.bindMarkerTracking === "function") {
                        stopMarkerTracking = runtimeModule.bindMarkerTracking(markerEls, {
                            onMarkerFound: (summary) => {
                                markerVisibilityState.set(summary.markerId, true);
                                markerDetected = true;
                                activateMarker(summary.markerNode);
                            },
                            onMarkerLost: (summary) => {
                                markerVisibilityState.set(summary.markerId, false);
                                markerDetected = !!summary.isAnyVisible;
                                if (!markerDetected) {
                                    statusEl.textContent = "Marker lost. Point the camera back to the marker to show the model again.";
                                }
                            },
                        });
                        return;
                    }
                } catch {
                    // Fallback listener below handles non-module runtime.
                }

                stopMarkerTracking = bindFallbackMarkerTracking();
            }

            void bindMarkerTrackingHandlers();

            if (window.location.protocol !== "https:" && window.location.hostname !== "localhost") {
                statusEl.textContent = "HTTPS is required to enable AR camera permission in modern browsers.";
            }
        })();
    </script>
</body>

</html>
