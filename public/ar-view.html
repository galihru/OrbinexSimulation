    <style>
        :root {
            color-scheme: dark;
            --bg: #07142d;
            --panel: rgba(8, 20, 44, 0.86);
            --panel-border: rgba(117, 164, 239, 0.42);
            --text: #e5efff;
            --muted: #a7bee4;
            --accent: #86beff;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            width: 100dvw;
            height: 100dvh;
            background: transparent;
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            max-width: 100vw;
            max-height: 100vh;
            max-width: 100dvw;
            max-height: 100dvh;
            overflow: hidden !important;
            overflow-x: hidden !important;
            overflow-y: hidden !important;
            overscroll-behavior: none;
            touch-action: none;
        }

        .skip-link {
            position: fixed;
            left: 12px;
            top: -48px;
            z-index: 9999;
            padding: 0.45rem 0.72rem;
            border-radius: 10px;
            background: #f2f7ff;
            color: #0f2652;
            text-decoration: none;
            font-weight: 700;
        }

        .skip-link:focus {
            top: calc(8px + env(safe-area-inset-top));
        }

        html.modal-open,
        body.modal-open {
            overflow: hidden !important;
            overscroll-behavior-y: none;
        }

        #ar-app {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            width: 100dvw;
            height: 100dvh;
            background: #000;
            overflow: hidden !important;
            overscroll-behavior: none;
        }

        a-scene {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            width: 100dvw !important;
            height: 100dvh !important;
            z-index: 1 !important;
            transition: inset 280ms ease, width 280ms ease, height 280ms ease, border-radius 280ms ease, box-shadow 280ms ease;
        }

        #arjs-video,
        .arjs-video,
        .ar-main-video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 1px !important;
            height: 1px !important;
            object-fit: cover !important;
            z-index: -5 !important;
            background: transparent !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .camera-display-video {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            width: 100dvw;
            height: 100dvh;
            object-fit: cover;
            background: #000;
            z-index: 0;
            opacity: 1;
            pointer-events: none;
            transition: opacity 260ms ease;
        }

        .a-canvas,
        a-scene canvas {
            position: absolute !important;
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 2 !important;
            background: transparent !important;
            opacity: 1;
            transition: opacity 260ms ease, transform 260ms ease, border-radius 260ms ease;
        }

        body.mode-ar-main .camera-display-video {
            opacity: 1 !important;
            pointer-events: none !important;
            z-index: 0 !important;
        }

        body.mode-camera-main .camera-display-video {
            opacity: 1 !important;
            pointer-events: none !important;
            z-index: 2 !important;
        }

        body.mode-camera-main a-scene,
        body.mode-camera-main #ar-scene {
            z-index: 3 !important;
        }

        .ar-overlay {
            position: fixed;
            top: auto;
            left: max(10px, env(safe-area-inset-left));
            right: max(10px, env(safe-area-inset-right));
            bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 18;
            padding: 0.4rem 0.72rem 0.78rem;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            background: rgba(8, 20, 44, 0.62);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            pointer-events: auto;
            max-height: min(62vh, 430px);
            max-width: min(560px, calc(100vw - 20px));
            margin: 0 auto;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-gutter: stable;
            overscroll-behavior: contain;
            touch-action: pan-y;
            transform: translate3d(0, 0, 0);
            transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 220ms ease;
            will-change: transform;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
        }

        .ar-overlay.sheet-closed {
            transform: translate3d(0, calc(100% + 28px), 0);
            opacity: 0;
            pointer-events: none;
        }

        .ar-overlay.sheet-dragging {
            transition: none;
        }

        .ar-overlay::-webkit-scrollbar {
            width: 6px;
        }

        .ar-overlay::-webkit-scrollbar-thumb {
            background: rgba(133, 177, 247, 0.42);
            border-radius: 6px;
        }

        .sheet-handle-zone {
            display: grid;
            gap: 0.24rem;
            justify-items: center;
            margin: -0.12rem 0 0.24rem;
            padding: 0.2rem 0 0.12rem;
            touch-action: none;
            user-select: none;
        }

        .sheet-grabber {
            width: 50px;
            height: 5px;
            border-radius: 999px;
            background: rgba(180, 208, 255, 0.74);
        }

        .sheet-swipe-text {
            font-size: 0.68rem;
            color: #aac4ea;
        }

        .ar-sheet-toggle {
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            left: max(10px, env(safe-area-inset-left));
            width: 42px;
            height: 42px;
            z-index: 13;
            border-radius: 11px;
            border: 1px solid rgba(141, 185, 250, 0.62);
            background: rgba(11, 29, 57, 0.92);
            color: #dbeaff;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px) saturate(120%);
            cursor: pointer;
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .ar-sheet-toggle[aria-expanded="true"] {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
        }

        .ar-overlay h1 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 0.02em;
        }

        .ar-overlay p {
            margin: 0.25rem 0 0;
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .ar-toolbar {
            margin-top: 0.44rem;
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
            width: 100%;
            overflow: hidden;
        }

        .ar-toolbar a,
        .ar-toolbar button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            padding: 0.35rem 0.56rem;
            border-radius: 9px;
            border: 1px solid rgba(133, 177, 247, 0.55);
            background: rgba(16, 36, 70, 0.9);
            color: #dbe9ff;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            min-width: 0;
            max-width: 100%;
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .ar-toolbar a:hover,
        .ar-toolbar button:hover {
            background: rgba(25, 52, 98, 0.95);
        }

        .ar-speed-row {
            margin-top: 0.4rem;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 0.42rem;
            width: 100%;
            min-width: 0;
        }

        .ar-speed-row label {
            font-size: 0.7rem;
            color: #aac4ea;
        }

        .ar-speed-row input[type="range"] {
            width: 100%;
            min-width: 0;
        }

        .ar-speed-value {
            min-width: 88px;
            text-align: right;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 0.7rem;
            color: #d6e6ff;
        }

        .ar-system-meta {
            margin-top: 0.34rem !important;
            color: #c5d9f7 !important;
            font-size: 0.72rem !important;
        }

        .gesture-pad {
            position: fixed;
            inset: 0;
            z-index: 7;
            touch-action: none;
            background: transparent;
        }

        .ar-marker-hint {
            position: fixed;
            right: 10px;
            bottom: 10px;
            width: 105px;
            height: 105px;
            z-index: 11;
            border-radius: 10px;
            border: 1px solid rgba(137, 178, 239, 0.5);
            background: rgba(255, 255, 255, 0.94);
            padding: 4px;
            box-sizing: border-box;
            pointer-events: auto;
            transform-origin: bottom right;
            transition: transform 180ms ease, box-shadow 180ms ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.34);
        }

        .ar-marker-hint:hover,
        .ar-marker-hint:focus-visible {
            transform: scale(1.72);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.48);
        }

        .ar-marker-hint img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            display: block;
        }

        .pip-swap {
            position: fixed;
            left: max(10px, env(safe-area-inset-left));
            bottom: calc(10px + env(safe-area-inset-bottom));
            width: clamp(140px, 38vw, 220px);
            height: clamp(92px, 24vw, 132px);
            z-index: 14;
            border-radius: 14px;
            border: 1px solid rgba(150, 192, 255, 0.68);
            background: rgba(6, 18, 38, 0.44);
            backdrop-filter: blur(12px) saturate(130%);
            -webkit-backdrop-filter: blur(12px) saturate(130%);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.42);
            overflow: hidden;
            padding: 0;
            cursor: pointer;
        }

        .pip-swap video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #000;
        }

        .pip-swap-label {
            position: absolute;
            right: 6px;
            bottom: 6px;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #eff6ff;
            background: rgba(10, 26, 50, 0.7);
            border: 1px solid rgba(158, 199, 255, 0.55);
            border-radius: 999px;
            padding: 0.16rem 0.42rem;
            pointer-events: none;
        }

        body.mode-camera-main .pip-swap {
            display: none;
        }

        body.mode-ar-main #ar-scene,
        body.mode-ar-main a-scene {
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            right: auto !important;
            bottom: auto !important;
            width: 100vw !important;
            height: 100vh !important;
            width: 100dvw !important;
            height: 100dvh !important;
            z-index: 1 !important;
            border: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            overflow: visible !important;
            background: transparent !important;
        }

        body.mode-ar-main .a-canvas,
        body.mode-ar-main a-scene canvas {
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            z-index: 2 !important;
            border-radius: 0 !important;
            border: 0 !important;
            box-shadow: none !important;
            background: transparent !important;
        }

        body.mode-camera-main #ar-scene,
        body.mode-camera-main a-scene {
            inset: auto !important;
            top: auto !important;
            right: auto !important;
            left: max(10px, env(safe-area-inset-left)) !important;
            bottom: calc(10px + env(safe-area-inset-bottom)) !important;
            width: 220px !important;
            width: clamp(140px, 38vw, 220px) !important;
            height: 132px !important;
            height: clamp(92px, 24vw, 132px) !important;
            z-index: 14 !important;
            position: fixed !important;
            border-radius: 14px !important;
            border: 1px solid rgba(150, 192, 255, 0.68);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.42);
            overflow: hidden !important;
            cursor: pointer;
            background: transparent !important;
        }

        body.mode-camera-main .a-canvas,
        body.mode-camera-main a-scene canvas {
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            z-index: 1 !important;
            border-radius: 14px !important;
            border: 0 !important;
            box-shadow: none !important;
            background: transparent !important;
        }

        body.mode-camera-main #gesture-pad {
            pointer-events: none;
        }

        body.swap-animating #arjs-video,
        body.swap-animating .arjs-video,
        body.swap-animating .a-canvas,
        body.swap-animating a-scene canvas,
        body.swap-animating .camera-display-video,
        body.swap-animating .pip-swap {
            transition-duration: 340ms !important;
        }

        .a-enter-vr-button,
        .a-orientation-modal,
        .a-canvas-loader {
            display: none !important;
        }

        .arjs-loader {
            display: none !important;
        }

        @media (max-width: 560px) {
            .ar-overlay {
                max-height: min(58vh, 360px);
                border-radius: 15px;
                left: max(8px, env(safe-area-inset-left));
                right: max(8px, env(safe-area-inset-right));
            }

            .ar-toolbar {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));

            }

            .ar-toolbar a,
            .ar-toolbar button {
                min-height: 30px;
                font-size: 0.72rem;
                padding: 0.32rem 0.5rem;
                width: 100%;
            }

            .ar-speed-row {
                grid-template-columns: 1fr;
                gap: 0.3rem;
            }

            .ar-speed-value {
                text-align: left;
            }

            .ar-marker-hint {
                width: 94px;
                height: 94px;
            }

            .pip-swap,
            body.mode-camera-main #ar-scene,
            body.mode-camera-main a-scene {
                left: max(8px, env(safe-area-inset-left)) !important;
                bottom: calc(8px + env(safe-area-inset-bottom)) !important;
            }
        }
    </style>

    <script>
        // Hint 2D canvases for frequent readback to reduce AR.js warning noise.
        (() => {
            const proto = HTMLCanvasElement && HTMLCanvasElement.prototype;
            if (!proto || typeof proto.getContext !== "function" || proto.getContext.__orbinexPatched) {
                return;
            }

            const originalGetContext = proto.getContext;
            const patchedGetContext = function (type, options) {
                if (type === "2d") {
                    const nextOptions = options && typeof options === "object"
                        ? { ...options, willReadFrequently: true }
                        : { willReadFrequently: true };
                    return originalGetContext.call(this, type, nextOptions);
                }

                return originalGetContext.call(this, type, options);
            };

            patchedGetContext.__orbinexPatched = true;
            proto.getContext = patchedGetContext;
        })();
    </script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="./vendor/aframe-ar.min.js"></script>
</head>

<body>
    <a class="skip-link" href="#ar-overlay">Skip to AR controls</a>
    <main id="ar-app" role="main" aria-label="Orbinex AR viewer">
        <button id="sheet-toggle" class="ar-sheet-toggle" type="button" aria-controls="ar-overlay" aria-expanded="true"
            aria-label="Open AR info panel">&#9776;</button>

        <section id="ar-overlay" class="ar-overlay" aria-live="polite">
            <div id="sheet-handle" class="sheet-handle-zone" aria-label="Swipe down to close panel">
                <span class="sheet-grabber" aria-hidden="true"></span>
                <span class="sheet-swipe-text">Swipe down to close panel</span>
            </div>
            <h1>Orbinex AR Viewer: <span id="ar-model-name">Earth</span></h1>
            <p id="ar-status" role="status" aria-live="polite">Enable camera access, scan a Hiro/Kanji marker, and the
                mapped model will appear.</p>
            <div class="ar-toolbar">
                <a id="open-desktop" href="#" rel="noopener noreferrer">Open Desktop Simulation</a>
                <a id="open-marker" href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
                    target="_blank" rel="noopener noreferrer">Open Active Marker</a>
                <button id="zoom-in" type="button">Zoom +</button>
                <button id="zoom-out" type="button">Zoom -</button>
                <button id="rot-left" type="button">Rotate -</button>
                <button id="rot-right" type="button">Rotate +</button>
                <button id="view-reset" type="button">Reset View</button>
            </div>
            <div class="ar-speed-row">
                <label for="speed-range">Simulation speed</label>
                <input id="speed-range" type="range" min="0.05" max="24" step="0.05" value="2.5" />
                <span id="speed-value" class="ar-speed-value">2.50 days/sec</span>

            <p id="ar-system-meta" class="ar-system-meta">Preparing AR orbit system...</p>

        <a id="ar-marker-hint" href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"

            <img id="ar-marker-hint-image"
                src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
                alt="Hiro marker for AR tracking" />
        </a>

        <video id="camera-display-video" class="camera-display-video" autoplay muted playsinline
            webkit-playsinline></video>

        <div id="gesture-pad" class="gesture-pad" aria-hidden="true"></div>

        <button id="pip-swap" class="pip-swap" type="button" aria-label="Swap to main camera view">
            <video id="pip-camera-video" autoplay muted playsinline webkit-playsinline></video>
            <span id="pip-swap-label" class="pip-swap-label">Camera</span>
        </button>

        <a-scene id="ar-scene" embedded loading-screen="enabled: false" vr-mode-ui="enabled: false"
            renderer="antialias: true; alpha: true; precision: high; colorManagement: true"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono; matrixCodeType: 3x3; maxDetectionRate: 60; canvasWidth: 3840; canvasHeight: 2160; sourceWidth: 3840; sourceHeight: 2160;">
            <a-marker id="orbinex-marker-hiro" data-model="" data-marker-label="Hiro"
                data-marker-image="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
                data-marker-link="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
                preset="hiro" emitevents="true" smooth="true" smoothCount="8" smoothTolerance="0.01"
                smoothThreshold="5">
                <a-plane width="1.08" height="1.08" position="0 0.003 0" rotation="-90 0 0"
                    material="shader: flat; color: #f3f6fb; opacity: 0.94; transparent: true; side: double; depthTest: false; depthWrite: false"></a-plane>
                <a-entity id="model-root-hiro" data-model-root position="0 0 0"></a-entity>
            </a-marker>

            <a-marker id="orbinex-marker-kanji" data-model="Mars" data-marker-label="Kanji"
                data-marker-image="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/kanji.png"
                data-marker-link="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/kanji.png"
                preset="kanji" emitevents="true" smooth="true" smoothCount="8" smoothTolerance="0.01"
                smoothThreshold="5">
                <a-plane width="1.08" height="1.08" position="0 0.003 0" rotation="-90 0 0"
                    material="shader: flat; color: #f3f6fb; opacity: 0.94; transparent: true; side: double; depthTest: false; depthWrite: false"></a-plane>
                <a-entity id="model-root-kanji" data-model-root position="0 0 0"></a-entity>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
    </main>

    <script>
        (function () {
            const AU_METERS = 1.495978707e11;
            const DAY_SECONDS = 86400;
            const G = 6.6743e-11;
            const SOLAR_MASS_KG = 1.98847e30;
            const TAU = Math.PI * 2;
            const MARKER_HIRO_URL = "https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png";
            const MARKER_KANJI_URL = "https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/kanji.png";

            const params = new URLSearchParams(window.location.search);
            function fallbackArRequestFromParams(searchParams) {
                const paramKeys = ["model", "object", "target", "name"];
                let model = "";

                for (const key of paramKeys) {
                    const value = searchParams.get(key);
                    if (value && value.trim()) {
                        model = value.trim();
                        break;
                    }
                }

                return {
                    model: model || "Earth",
                    altModel: (searchParams.get("altModel") || "Mars").trim() || "Mars",
                    buildToken: (searchParams.get("build") || "latest").trim() || "latest",
                };
            }

            const initialArRequest = fallbackArRequestFromParams(params);
            let requestedModel = initialArRequest.model;
            let requestedAltModel = initialArRequest.altModel;

                if (results.some((value) => value === "granted")) {
                    return "granted";
                }
                if (results.some((value) => value === "denied")) {
                    return "denied";
                }
                return "unsupported";
            }

            function normalizePermissionResult(value) {
                return value === "granted" || value === "denied" || value === "unsupported"
                    ? value

            async function loadOrbinexsimRuntimeModule() {
                if (orbinexsimRuntimeModulePromise) {
                    return orbinexsimRuntimeModulePromise;
                }

                orbinexsimRuntimeModulePromise = (async () => {
                    for (const sourceUrl of ORBINEXSIM_RUNTIME_MODULE_SOURCES) {
                        try {
                            const runtimeModule = await import(sourceUrl);
                            if (runtimeModule && typeof runtimeModule.requestRuntimePermissions === "function") {
                                orbinexsimRuntimeModule = runtimeModule;
                                orbinexsimRuntimeSource = sourceUrl;
                                return runtimeModule;
                            }
                        } catch {
                            // Try the next CDN endpoint.
                        }
                    }
                    return null;
                })();

                return orbinexsimRuntimeModulePromise;
            }

            async function requestRuntimePermissionsFromModule() {
                try {
                    const runtimeModule = await loadOrbinexsimRuntimeModule();
                    if (!runtimeModule || typeof runtimeModule.requestRuntimePermissions !== "function") {
                        return { ...UNSUPPORTED_RUNTIME_PERMISSIONS };
                    }

                    const result = await runtimeModule.requestRuntimePermissions({
                        camera: true,
                        microphone: true,
                        geolocation: true,
                        motionSensors: true,
                    });

                    return {
                        camera: normalizePermissionResult(result && result.camera),
                        microphone: normalizePermissionResult(result && result.microphone),
                        geolocation: normalizePermissionResult(result && result.geolocation),
                        motionSensors: normalizePermissionResult(result && result.motionSensors),
                    };
                } catch {
                    return { ...UNSUPPORTED_RUNTIME_PERMISSIONS };
                }
            }

            async function syncArMarkersFromRuntimeModule() {
                try {
                    const runtimeModule = await loadOrbinexsimRuntimeModule();
                    if (!runtimeModule || typeof runtimeModule.createDefaultArMarkers !== "function" || typeof runtimeModule.ensureArMarkers !== "function") {
                        return;
                    }

                    if (typeof runtimeModule.parseArRequestFromSearch === "function") {
                        const parsedArRequest = runtimeModule.parseArRequestFromSearch(window.location.search);
                        if (parsedArRequest && parsedArRequest.model) {
                            requestedModel = String(parsedArRequest.model).trim() || requestedModel;
                        }
                        if (parsedArRequest && parsedArRequest.altModel) {
                            requestedAltModel = String(parsedArRequest.altModel).trim() || requestedAltModel;
                        }
                    }

                    let markerConfigs = runtimeModule.createDefaultArMarkers(requestedModel, requestedAltModel);
                    if (runtimeCatalogEntries.length && typeof runtimeModule.createMarkersFromCatalog === "function") {
                        markerConfigs = runtimeModule.createMarkersFromCatalog(runtimeCatalogEntries, markerConfigs);
                    }

                    runtimeModule.ensureArMarkers(sceneEl, markerConfigs, {
                        createMissing: true,
                        ensureModelRoot: true,
                    });

                    refreshMarkerReferences();
                    modelNameEl.textContent = displayBodyName(requestedModel);
                    desktopUrl.searchParams.set("model", requestedModel);

            async function applyCatalogProxyFromRuntimeModule() {
                try {
                    const runtimeModule = await loadOrbinexsimRuntimeModule();
                    if (!runtimeModule || typeof runtimeModule.resolveCatalogProxyUrl !== "function" || typeof runtimeModule.loadCatalogFromProxy !== "function") {
                        return;
                    }

                    const proxyUrl = runtimeModule.resolveCatalogProxyUrl(window.location.search);
                    if (!proxyUrl || proxyUrl === runtimeCatalogSource) {
                        return;
                    }

                    const proxyEntries = await runtimeModule.loadCatalogFromProxy(proxyUrl, { timeoutMs: 15000 });
                    if (!Array.isArray(proxyEntries) || !proxyEntries.length) {
                        return;
                    }

                    runtimeCatalogEntries = proxyEntries;
                    runtimeCatalogSource = proxyUrl;

                    proxyEntries.forEach((entry) => {
                        if (!entry || !entry.name) {
                            return;
                        }

                        const entryName = String(entry.name).trim();
                        if (!entryName) {
                            return;
                        }

                        const entryKind = (entry.kind || inferKindFromName(entryName) || "planet").trim();
                        const entryColor = (entry.color || defaultColorForKind(entryKind) || "#84aee4").trim();
                        const massValue = Number(entry.massKg);
                        const radiusValue = Number(entry.radiusMeters);
                        const semiMajorValue = Number(entry.semiMajorMeters);
                        const periodValue = Number(entry.periodDays);
                        const rotationValue = Number(entry.rotationHours);
                        const inclinationValue = Number(entry.inclinationDeg);

                        registerBody({
                            name: entryName,
                            kind: entryKind,
                            massKg: Number.isFinite(massValue) ? massValue : undefined,
                            radiusMeters: Number.isFinite(radiusValue) ? radiusValue : undefined,
                            color: entryColor,
                            parentName: entry.parentName || null,
                            semiMajorMeters: Number.isFinite(semiMajorValue) ? semiMajorValue : null,
                            periodDays: Number.isFinite(periodValue) ? periodValue : null,
                            rotationHours: Number.isFinite(rotationValue) ? rotationValue : null,
                            inclinationDeg: Number.isFinite(inclinationValue) ? inclinationValue : undefined,
                        });
                    });

                    await syncArMarkersFromRuntimeModule();
                    setActiveFocusByName(requestedModel, (activeMarkerEl && activeMarkerEl.dataset.markerLabel) || "QR/Hiro");
                    statusEl.textContent = `Catalog proxy enabled: ${proxyEntries.length} objects loaded.`;
                } catch {
                    // Keep local catalog and marker fallback if proxy is unavailable.
                }
            }

            async function requestPersistentStoragePermission() {
                if (!("storage" in navigator) || !("persist" in navigator.storage)) {
                    return "unsupported";
                }

                try {
                    const persisted = await navigator.storage.persist();
                    return persisted ? "granted" : "denied";
                } catch {
                    return "denied";
                }
            }

            async function requestScreenWakeLockPermission() {
                if (!window.isSecureContext || document.hidden) {
                    return "unsupported";
                }

                if (arWakeLockHandle) {
                    return "granted";
                }

                if (!navigator.wakeLock || typeof navigator.wakeLock.request !== "function") {
                    return "unsupported";
                }

                try {
                    arWakeLockHandle = await navigator.wakeLock.request("screen");
                    return "granted";
                } catch {
                    return "denied";
                }
            }

            function optimizeArNodesForLowLag() {
                if (!arSystem || !Array.isArray(arSystem.nodes)) {
                    return;
                }

                for (const node of arSystem.nodes) {
                    const isPrimary = node.body && (node.body.name === arSystem.focusBody.name || node.body.name === arSystem.rootBody.name);
                    if (node.labelEl && !isPrimary) {
                        node.labelEl.setAttribute("visible", "false");
                    }
                    if (node.orbitTrackEl && !isPrimary) {
                        node.orbitTrackEl.setAttribute("visible", "false");
                    }
                }
            }

            function activateArLowLagProfile(reason) {
                if (arLowLagModeActive) {
                    return;
                }

                arLowLagModeActive = true;
                orbitDaysPerSecond = Math.min(orbitDaysPerSecond, 8);
                speedRange.value = String(orbitDaysPerSecond);
                speedValue.textContent = `${orbitDaysPerSecond.toFixed(2)} days/sec`;
                optimizeArNodesForLowLag();

                try {
                    window.localStorage.setItem(AR_RUNTIME_PROFILE_STORAGE_KEY, "low-lag");
                } catch {
                    // Ignore storage failures in private mode.
                }

                statusEl.textContent = `AR low-lag mode enabled (${reason}).`;
            }

            function restoreArRuntimeProfile() {
                try {
                    const forcedProfile = (params.get("profile") || "").trim().toLowerCase();
                    if (forcedProfile === "low-lag") {
                        activateArLowLagProfile("profile override");
                        return;
                    }

                    // Keep high-quality mode as default unless explicitly overridden.
                    if (window.localStorage.getItem(AR_RUNTIME_PROFILE_STORAGE_KEY) === "low-lag") {
                        window.localStorage.removeItem(AR_RUNTIME_PROFILE_STORAGE_KEY);
                    }
                } catch {
                    // Ignore storage failures in private mode.
                }
            }

            async function requestArAccessPermissions() {
                const runtimePermissionsPromise = requestRuntimePermissionsFromModule();
                const persistentStoragePromise = requestPersistentStoragePermission();
                const wakeLockPromise = requestScreenWakeLockPermission();

                const [
                    runtimePermissions,
                    persistentStorage,
                    wakeLock,
                ] = await Promise.all([
                    runtimePermissionsPromise,
                    persistentStoragePromise,
                    wakeLockPromise,
                ]);

                const camera = normalizePermissionResult(runtimePermissions && runtimePermissions.camera);
                const geolocation = normalizePermissionResult(runtimePermissions && runtimePermissions.geolocation);
                const motionSensors = normalizePermissionResult(runtimePermissions && runtimePermissions.motionSensors);
                const microphone = normalizePermissionResult(runtimePermissions && runtimePermissions.microphone);

                const deviceUse = mergePermissionResults([geolocation, motionSensors, microphone]);

                const capabilities = {
                    deviceUse,
                    geolocation,
                    motionSensors,
                    microphone,
                    camera,
                    persistentStorage,
                    wakeLock,
                };

                systemMetaEl.textContent = orbinexsimRuntimeSource
                    ? "Device access handled by @galihru/orbinexsim runtime module."
                    : "Device access handled directly by browser (fallback).";
                return capabilities;

            async function applyArPermissionDrivenOptimizations(capabilities, trigger) {

            async function cachePwaDatabaseAssets() {
                await Promise.all(pwaDbFiles.map(async (url) => {
                    try {
                        await fetch(url, { cache: "reload" });
                    } catch {
                        // Retry later when connection is stable.
                    }
                }));

                if ("serviceWorker" in navigator) {
                    try {
                        const registration = await navigator.serviceWorker.ready;
                        registration.active && registration.active.postMessage({ type: "CACHE_DB_NOW" });
                    } catch {
                        // Ignore service worker timing race.
                    }
                }
            }

                    const swUrl = new URL("./sw.js", baseUrl);

                    const registration = await navigator.serviceWorker.register(swUrl.toString(), {
                        scope: baseUrl.pathname,
                        updateViaCache: "none",
                    });
                    await registration.update();
                } catch {
                    // Fallback: app still works without offline cache.
                }
            }
