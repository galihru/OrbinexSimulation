<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Orbinex AR Viewer</title>
    <meta name="description"
        content="Viewer AR Orbinex untuk menampilkan objek semesta dari parameter model lewat QR code." />
    <meta name="theme-color" content="#07142d" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #07142d;
            --panel: rgba(8, 20, 44, 0.86);
            --panel-border: rgba(117, 164, 239, 0.42);
            --text: #e5efff;
            --muted: #a7bee4;
            --accent: #86beff;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            overflow-x: hidden;
            overscroll-behavior-x: none;
            overscroll-behavior-y: none;
            touch-action: manipulation;
        }

        html.modal-open,
        body.modal-open {
            overflow: hidden !important;
            overscroll-behavior-y: none;
        }

        #ar-app {
            position: fixed;
            inset: 0;
            background: #000;
            overflow: hidden;
            overscroll-behavior-x: none;
            overscroll-behavior-y: none;
        }

        a-scene {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 1 !important;
            transition: inset 280ms ease, width 280ms ease, height 280ms ease, border-radius 280ms ease, box-shadow 280ms ease;
        }

        #arjs-video,
        .arjs-video,
        .ar-main-video {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            z-index: 0 !important;
            background: #000 !important;
            opacity: 0 !important;
            transition: opacity 260ms ease;
        }

        .a-canvas,
        a-scene canvas {
            position: absolute !important;
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 2 !important;
            background: transparent !important;
            opacity: 1;
            transition: opacity 260ms ease, transform 260ms ease, border-radius 260ms ease;
        }

        body.mode-ar-main #arjs-video,
        body.mode-ar-main .arjs-video,
        body.mode-ar-main .ar-main-video {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        body.mode-camera-main #arjs-video,
        body.mode-camera-main .arjs-video,
        body.mode-camera-main .ar-main-video {
            opacity: 1 !important;
            pointer-events: none !important;
            z-index: 2 !important;
        }

        body.mode-camera-main a-scene,
        body.mode-camera-main #ar-scene {
            z-index: 3 !important;
        }

        .ar-overlay {
            position: fixed;
            left: max(10px, env(safe-area-inset-left));
            right: max(10px, env(safe-area-inset-right));
            bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 12;
            padding: 0.4rem 0.72rem 0.78rem;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
            background: rgba(8, 20, 44, 0.62);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            pointer-events: auto;
            max-height: min(62vh, 430px);
            max-width: min(560px, calc(100vw - 20px));
            margin: 0 auto;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-gutter: stable;
            overscroll-behavior: contain;
            touch-action: pan-y;
            transform: translate3d(0, 0, 0);
            transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 220ms ease;
            will-change: transform;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
        }

        .ar-overlay.sheet-closed {
            transform: translate3d(0, calc(100% + 28px), 0);
            opacity: 0;
            pointer-events: none;
        }

        .ar-overlay.sheet-dragging {
            transition: none;
        }

        .ar-overlay::-webkit-scrollbar {
            width: 6px;
        }

        .ar-overlay::-webkit-scrollbar-thumb {
            background: rgba(133, 177, 247, 0.42);
            border-radius: 6px;
        }

        .sheet-handle-zone {
            display: grid;
            gap: 0.24rem;
            justify-items: center;
            margin: -0.12rem 0 0.24rem;
            padding: 0.2rem 0 0.12rem;
            touch-action: none;
            user-select: none;
        }

        .sheet-grabber {
            width: 50px;
            height: 5px;
            border-radius: 999px;
            background: rgba(180, 208, 255, 0.74);
        }

        .sheet-swipe-text {
            font-size: 0.68rem;
            color: #aac4ea;
        }

        .ar-sheet-toggle {
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            left: max(10px, env(safe-area-inset-left));
            width: 42px;
            height: 42px;
            z-index: 13;
            border-radius: 11px;
            border: 1px solid rgba(141, 185, 250, 0.62);
            background: rgba(11, 29, 57, 0.92);
            color: #dbeaff;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px) saturate(120%);
            cursor: pointer;
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .ar-sheet-toggle[aria-expanded="true"] {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
        }

        .ar-overlay h1 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 0.02em;
        }

        .ar-overlay p {
            margin: 0.25rem 0 0;
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .ar-toolbar {
            margin-top: 0.44rem;
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
            width: 100%;
            overflow: hidden;
        }

        .ar-toolbar a,
        .ar-toolbar button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
            padding: 0.35rem 0.56rem;
            border-radius: 9px;
            border: 1px solid rgba(133, 177, 247, 0.55);
            background: rgba(16, 36, 70, 0.9);
            color: #dbe9ff;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            min-width: 0;
            max-width: 100%;
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .ar-toolbar a:hover,
        .ar-toolbar button:hover {
            background: rgba(25, 52, 98, 0.95);
        }

        .ar-speed-row {
            margin-top: 0.4rem;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 0.42rem;
            width: 100%;
            min-width: 0;
        }

        .ar-speed-row label {
            font-size: 0.7rem;
            color: #aac4ea;
        }

        .ar-speed-row input[type="range"] {
            width: 100%;
            min-width: 0;
        }

        .ar-speed-value {
            min-width: 88px;
            text-align: right;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 0.7rem;
            color: #d6e6ff;
        }

        .ar-system-meta {
            margin-top: 0.34rem !important;
            color: #c5d9f7 !important;
            font-size: 0.72rem !important;
        }

        .gesture-pad {
            position: fixed;
            inset: 0;
            z-index: 7;
            touch-action: none;
            background: transparent;
        }

        .ar-marker-hint {
            position: fixed;
            right: 10px;
            bottom: 10px;
            width: 84px;
            height: 84px;
            z-index: 11;
            border-radius: 10px;
            border: 1px solid rgba(137, 178, 239, 0.5);
            background: rgba(255, 255, 255, 0.94);
            padding: 4px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .ar-marker-hint img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            display: block;
        }

        .pip-swap {
            position: fixed;
            left: max(10px, env(safe-area-inset-left));
            bottom: calc(10px + env(safe-area-inset-bottom));
            width: clamp(140px, 38vw, 220px);
            height: clamp(92px, 24vw, 132px);
            z-index: 14;
            border-radius: 14px;
            border: 1px solid rgba(150, 192, 255, 0.68);
            background: rgba(6, 18, 38, 0.44);
            backdrop-filter: blur(12px) saturate(130%);
            -webkit-backdrop-filter: blur(12px) saturate(130%);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.42);
            overflow: hidden;
            padding: 0;
            cursor: pointer;
        }

        .pip-swap video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #000;
        }

        .pip-swap-label {
            position: absolute;
            right: 6px;
            bottom: 6px;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #eff6ff;
            background: rgba(10, 26, 50, 0.7);
            border: 1px solid rgba(158, 199, 255, 0.55);
            border-radius: 999px;
            padding: 0.16rem 0.42rem;
            pointer-events: none;
        }

        body.mode-camera-main .pip-swap {
            display: none;
        }

        body.mode-ar-main #ar-scene,
        body.mode-ar-main a-scene {
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 1 !important;
            border: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            overflow: visible !important;
            background: transparent !important;
        }

        body.mode-ar-main .a-canvas,
        body.mode-ar-main a-scene canvas {
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            z-index: 2 !important;
            border-radius: 0 !important;
            border: 0 !important;
            box-shadow: none !important;
            background: transparent !important;
        }

        body.mode-camera-main #ar-scene,
        body.mode-camera-main a-scene {
            inset: auto !important;
            top: auto !important;
            right: auto !important;
            left: max(10px, env(safe-area-inset-left)) !important;
            bottom: calc(10px + env(safe-area-inset-bottom)) !important;
            width: 220px !important;
            width: clamp(140px, 38vw, 220px) !important;
            height: 132px !important;
            height: clamp(92px, 24vw, 132px) !important;
            z-index: 14 !important;
            position: fixed !important;
            border-radius: 14px !important;
            border: 1px solid rgba(150, 192, 255, 0.68);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.42);
            overflow: hidden !important;
            cursor: pointer;
            background: transparent !important;
        }

        body.mode-camera-main .a-canvas,
        body.mode-camera-main a-scene canvas {
            inset: 0 !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            z-index: 1 !important;
            border-radius: 14px !important;
            border: 0 !important;
            box-shadow: none !important;
            background: transparent !important;
        }

        body.mode-camera-main #gesture-pad {
            pointer-events: none;
        }

        body.swap-animating #arjs-video,
        body.swap-animating .arjs-video,
        body.swap-animating .a-canvas,
        body.swap-animating a-scene canvas,
        body.swap-animating .pip-swap {
            transition-duration: 340ms !important;
        }

        .a-enter-vr-button,
        .a-orientation-modal,
        .a-canvas-loader {
            display: none !important;
        }

        .arjs-loader {
            display: none !important;
        }

        @media (max-width: 560px) {
            .ar-overlay {
                max-height: min(58vh, 360px);
                border-radius: 15px;
                left: max(8px, env(safe-area-inset-left));
                right: max(8px, env(safe-area-inset-right));
            }

            .ar-toolbar {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.4rem;
            }

            .ar-toolbar a,
            .ar-toolbar button {
                min-height: 30px;
                font-size: 0.72rem;
                padding: 0.32rem 0.5rem;
                width: 100%;
            }

            .ar-speed-row {
                grid-template-columns: 1fr;
                gap: 0.3rem;
            }

            .ar-speed-value {
                text-align: left;
            }

            .ar-marker-hint {
                width: 78px;
                height: 78px;
            }

            .pip-swap,
            body.mode-camera-main #ar-scene,
            body.mode-camera-main a-scene {
                left: max(8px, env(safe-area-inset-left)) !important;
                bottom: calc(8px + env(safe-area-inset-bottom)) !important;
            }
        }
    </style>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.8/aframe/build/aframe-ar.min.js"></script>
</head>

<body>
    <div id="ar-app">
        <button id="sheet-toggle" class="ar-sheet-toggle" type="button" aria-controls="ar-overlay" aria-expanded="true"
            aria-label="Buka panel info AR">&#9776;</button>

        <section id="ar-overlay" class="ar-overlay" aria-live="polite">
            <div id="sheet-handle" class="sheet-handle-zone" aria-label="Geser ke bawah untuk menutup panel">
                <span class="sheet-grabber" aria-hidden="true"></span>
                <span class="sheet-swipe-text">Swipe down untuk tutup panel</span>
            </div>
            <h1>Orbinex AR Viewer: <span id="ar-model-name">Bumi</span></h1>
            <p id="ar-status">Aktifkan kamera, scan marker Hiro, lalu objek akan muncul di atas marker.</p>
            <div class="ar-toolbar">
                <a id="open-desktop" href="#" rel="noopener noreferrer">Buka Simulasi Desktop</a>
                <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank"
                    rel="noopener noreferrer">Buka Marker Hiro</a>
                <button id="zoom-in" type="button">Zoom +</button>
                <button id="zoom-out" type="button">Zoom -</button>
                <button id="rot-left" type="button">Rotasi -</button>
                <button id="rot-right" type="button">Rotasi +</button>
                <button id="view-reset" type="button">Reset View</button>
            </div>
            <div class="ar-speed-row">
                <label for="speed-range">Kecepatan simulasi</label>
                <input id="speed-range" type="range" min="0.05" max="24" step="0.05" value="2.5" />
                <span id="speed-value" class="ar-speed-value">2.50 hari/detik</span>
            </div>
            <p id="ar-system-meta" class="ar-system-meta">Menyiapkan sistem orbit AR...</p>
        </section>

        <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" class="ar-marker-hint"
            target="_blank" rel="noopener noreferrer" aria-label="Marker Hiro">
            <img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
                alt="Marker Hiro untuk tracking AR" />
        </a>

        <div id="gesture-pad" class="gesture-pad" aria-hidden="true"></div>

        <button id="pip-swap" class="pip-swap" type="button" aria-label="Tukar tampilan ke kamera utama">
            <video id="pip-camera-video" autoplay muted playsinline webkit-playsinline></video>
            <span id="pip-swap-label" class="pip-swap-label">Kamera</span>
        </button>

        <a-scene id="ar-scene" embedded loading-screen="enabled: false" vr-mode-ui="enabled: false"
            renderer="antialias: true; alpha: true; precision: mediump"
            arjs="trackingMethod: best; sourceType: webcam; facingMode: environment; debugUIEnabled: false; detectionMode: mono; matrixCodeType: 3x3; maxDetectionRate: 60; canvasWidth: 1280; canvasHeight: 960;">
            <a-marker id="orbinex-marker" preset="hiro" emitevents="true" smooth="true" smoothCount="8"
                smoothTolerance="0.01" smoothThreshold="5">
                <a-entity id="model-root" position="0 0 0"></a-entity>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <script>
        (function () {
            const AU_METERS = 1.495978707e11;
            const DAY_SECONDS = 86400;
            const G = 6.6743e-11;
            const SOLAR_MASS_KG = 1.98847e30;
            const TAU = Math.PI * 2;

            const params = new URLSearchParams(window.location.search);
            const requestedModel = (params.get("model") || "Bumi").trim() || "Bumi";

            const modelNameEl = document.getElementById("ar-model-name");
            const statusEl = document.getElementById("ar-status");
            const systemMetaEl = document.getElementById("ar-system-meta");
            const sceneEl = document.getElementById("ar-scene");
            const markerEl = document.getElementById("orbinex-marker");
            const modelRoot = document.getElementById("model-root");
            const openDesktopLink = document.getElementById("open-desktop");
            const zoomInButton = document.getElementById("zoom-in");
            const zoomOutButton = document.getElementById("zoom-out");
            const rotLeftButton = document.getElementById("rot-left");
            const rotRightButton = document.getElementById("rot-right");
            const viewResetButton = document.getElementById("view-reset");
            const speedRange = document.getElementById("speed-range");
            const speedValue = document.getElementById("speed-value");
            const gesturePad = document.getElementById("gesture-pad");
            const sheetEl = document.getElementById("ar-overlay");
            const sheetHandle = document.getElementById("sheet-handle");
            const sheetToggleButton = document.getElementById("sheet-toggle");
            const pipSwapButton = document.getElementById("pip-swap");
            const pipCameraVideo = document.getElementById("pip-camera-video");
            const pipSwapLabel = document.getElementById("pip-swap-label");
            const rootHtml = document.documentElement;
            const bodyEl = document.body;

            modelNameEl.textContent = requestedModel;

            const baseUrl = new URL(".", window.location.href);
            const desktopUrl = new URL("./", baseUrl);
            desktopUrl.searchParams.set("desktop", "1");
            desktopUrl.searchParams.set("model", requestedModel);
            openDesktopLink.href = desktopUrl.toString();

            let sheetIsOpen = true;
            let sheetDragPointerId = null;
            let sheetDragStartY = 0;
            let sheetDragOffset = 0;
            let sheetAutoClosedAfterCamera = false;
            const SHEET_CLOSE_THRESHOLD = 92;

            let currentViewMode = "ar-main";
            let arMiniSwapBound = false;
            let swapAnimationTimer = 0;

            function setSheetOpen(open) {
                sheetIsOpen = !!open;
                sheetEl.classList.remove("sheet-dragging");
                sheetEl.style.transform = "";
                sheetEl.classList.toggle("sheet-closed", !sheetIsOpen);
                sheetToggleButton.setAttribute("aria-expanded", sheetIsOpen ? "true" : "false");
                rootHtml.classList.toggle("modal-open", sheetIsOpen);
                bodyEl.classList.toggle("modal-open", sheetIsOpen);
            }

            function finishSheetDrag(forceClose) {
                sheetEl.classList.remove("sheet-dragging");
                const shouldClose = forceClose || sheetDragOffset > SHEET_CLOSE_THRESHOLD;
                sheetDragPointerId = null;
                sheetDragOffset = 0;
                setSheetOpen(!shouldClose);
            }

            function autoCloseSheetAfterCameraReady() {
                if (sheetAutoClosedAfterCamera) {
                    return;
                }
                sheetAutoClosedAfterCamera = true;
                setSheetOpen(false);
            }

            function applyMainVideoLayer() {
                const mainVideo = cameraVideoElement();
                if (!mainVideo) {
                    return;
                }

                mainVideo.classList.add("ar-main-video");
                mainVideo.style.setProperty("position", "fixed", "important");
                mainVideo.style.setProperty("inset", "0", "important");
                mainVideo.style.setProperty("top", "0", "important");
                mainVideo.style.setProperty("left", "0", "important");
                mainVideo.style.setProperty("width", "100vw", "important");
                mainVideo.style.setProperty("height", "100vh", "important");
                mainVideo.style.setProperty("object-fit", "cover", "important");
                mainVideo.style.setProperty("background", "#000", "important");

                if (currentViewMode === "camera-main") {
                    mainVideo.style.setProperty("opacity", "1", "important");
                    mainVideo.style.setProperty("z-index", "2", "important");
                } else {
                    mainVideo.style.setProperty("opacity", "0", "important");
                    mainVideo.style.setProperty("z-index", "0", "important");
                }
                mainVideo.style.setProperty("pointer-events", "none", "important");
            }

            function sceneCanvasElement() {
                if (!sceneEl) {
                    return null;
                }

                const localCanvas = sceneEl.querySelector(".a-canvas, canvas");
                if (localCanvas) {
                    return localCanvas;
                }

                return document.querySelector("#ar-scene .a-canvas, #ar-scene canvas, .a-canvas, a-scene canvas");
            }

            function applySceneCanvasLayout() {
                if (!sceneEl) {
                    return;
                }

                const sceneCanvas = sceneCanvasElement();
                sceneEl.style.setProperty("position", "fixed", "important");
                sceneEl.style.setProperty("background", "transparent", "important");

                if (currentViewMode === "camera-main") {
                    sceneEl.style.setProperty("inset", "auto", "important");
                    sceneEl.style.setProperty("top", "auto", "important");
                    sceneEl.style.setProperty("right", "auto", "important");
                    sceneEl.style.setProperty("left", "max(10px, env(safe-area-inset-left))", "important");
                    sceneEl.style.setProperty("bottom", "calc(10px + env(safe-area-inset-bottom))", "important");
                    sceneEl.style.setProperty("width", "220px", "important");
                    sceneEl.style.setProperty("width", "clamp(140px, 38vw, 220px)", "important");
                    sceneEl.style.setProperty("height", "132px", "important");
                    sceneEl.style.setProperty("height", "clamp(92px, 24vw, 132px)", "important");
                    sceneEl.style.setProperty("z-index", "14", "important");
                    sceneEl.style.setProperty("border-radius", "14px", "important");
                    sceneEl.style.setProperty("border", "1px solid rgba(150, 192, 255, 0.68)", "important");
                    sceneEl.style.setProperty("box-shadow", "0 12px 30px rgba(0, 0, 0, 0.42)", "important");
                    sceneEl.style.setProperty("overflow", "hidden", "important");
                } else {
                    sceneEl.style.setProperty("inset", "0", "important");
                    sceneEl.style.setProperty("top", "0", "important");
                    sceneEl.style.setProperty("right", "auto", "important");
                    sceneEl.style.setProperty("left", "0", "important");
                    sceneEl.style.setProperty("bottom", "auto", "important");
                    sceneEl.style.setProperty("width", "100vw", "important");
                    sceneEl.style.setProperty("height", "100vh", "important");
                    sceneEl.style.setProperty("z-index", "1", "important");
                    sceneEl.style.setProperty("border-radius", "0", "important");
                    sceneEl.style.setProperty("border", "0", "important");
                    sceneEl.style.setProperty("box-shadow", "none", "important");
                    sceneEl.style.setProperty("overflow", "visible", "important");
                }

                if (!sceneCanvas) {
                    return;
                }

                sceneCanvas.style.setProperty("position", "absolute", "important");
                sceneCanvas.style.setProperty("inset", "0", "important");
                sceneCanvas.style.setProperty("top", "0", "important");
                sceneCanvas.style.setProperty("left", "0", "important");
                sceneCanvas.style.setProperty("width", "100%", "important");
                sceneCanvas.style.setProperty("height", "100%", "important");
                sceneCanvas.style.setProperty("transform", "none", "important");

                    return normalizedBody;
                }

                const lower = normalized;
                for (const body of catalogByName.values()) {
                    const n = normalizeKey(body.name);
                    if (n.includes(lower) || lower.includes(n)) {
                        ensureBodyDefaults(body);
                        return body;
                    }
                }

                return createFallbackBody(query);
            }

            function getChildren(parentName) {
                const children = [];
                for (const body of catalogByName.values()) {
                    if (body.parentName === parentName) {
                        ensureBodyDefaults(body);
                        children.push(body);
                    }
                }
                return children;
            }

            function sortByOrbit(a, b) {
                const sa = Number.isFinite(a.semiMajorMeters) ? a.semiMajorMeters : Number.MAX_SAFE_INTEGER;
                const sb = Number.isFinite(b.semiMajorMeters) ? b.semiMajorMeters : Number.MAX_SAFE_INTEGER;
                if (sa !== sb) {
                    return sa - sb;
                }
                return a.name.localeCompare(b.name);
            }

            function neighborhoodByFocus(items, focusName, count) {
                if (items.length <= count) {
                    return items;
                }
                const idx = items.findIndex((entry) => entry.name === focusName);
                if (idx < 0) {
                    return items.slice(0, count);
                }
                const half = Math.floor(count / 2);
                let start = Math.max(0, idx - half);
                if (start + count > items.length) {
                    start = Math.max(0, items.length - count);
                }
                return items.slice(start, start + count);
            }

            function buildDisplayBodies(focusBody) {
                const fixedRootKinds = new Set(["star", "galaxy", "cluster", "nebula", "black-hole"]);
                const useParentAsRoot = !!(focusBody.parentName && !fixedRootKinds.has(focusBody.kind));
                const rootBody = useParentAsRoot ? resolveBodyByName(focusBody.parentName) : focusBody;

                ensureBodyDefaults(rootBody);
                ensureBodyDefaults(focusBody);

                const included = new Map();
                const addBody = (body) => {
                    if (!body || included.has(body.name)) {
                        return;
                    }
                    ensureBodyDefaults(body);
                    included.set(body.name, body);
                };

                addBody(rootBody);
                addBody(focusBody);

                let rootChildren = getChildren(rootBody.name).sort(sortByOrbit);
                if (focusBody.name !== rootBody.name) {
                    rootChildren = neighborhoodByFocus(rootChildren, focusBody.name, rootBody.kind === "planet" ? 12 : 9);
                } else {
                    const rootLimit = rootBody.kind === "star"
                        ? 16
                        : rootBody.kind === "planet"
                            ? 26
                            : rootBody.kind === "galaxy"
                                ? 12
                                : 10;
                    rootChildren = rootChildren.slice(0, rootLimit);
                }
                rootChildren.forEach(addBody);

                const focusChildren = getChildren(focusBody.name).sort(sortByOrbit).slice(0, 30);
                focusChildren.forEach(addBody);

                if (focusBody.kind === "star" && focusBody.name === rootBody.name) {
                    rootChildren
                        .filter((body) => body.kind === "planet" || body.kind === "dwarf")
                        .forEach((planet) => {
                            getChildren(planet.name).sort(sortByOrbit).slice(0, 4).forEach(addBody);
                        });
                }

                if (focusBody.kind === "galaxy" && focusBody.name === rootBody.name) {
                    getChildren(focusBody.name).sort(sortByOrbit).slice(0, 18).forEach(addBody);
                }

                const bodies = Array.from(included.values());
                return { rootBody, focusBody, bodies };
            }

            function depthFromRoot(body, rootName) {
                let depth = 0;
                let cursor = body;
                let guard = 0;
                while (cursor && cursor.name !== rootName && guard < 48) {
                    const parent = cursor.parentName ? getBody(cursor.parentName) : null;
                    if (!parent) {
                        depth += 1;
                        break;
                    }
                    depth += 1;
                    cursor = parent;
                    guard += 1;
                }
                return depth;
            }

            function createEntity(tagName, attrs) {
                const el = document.createElement(tagName);
                if (attrs) {
                    Object.keys(attrs).forEach((key) => {
                        el.setAttribute(key, attrs[key]);
                    });
                }
                return el;
            }

            function isRingedBody(bodyName) {
                return bodyName === "Saturnus" || bodyName === "Uranus";
            }

            function displayRadiusForBody(body, parentNode, focusName) {
                const logRadius = Math.log10(Math.max(body.radiusMeters, 1));
                let base;

                if (body.kind === "star") {
                    base = clamp(0.28 + (logRadius - 6.0) * 0.16, 0.26, 0.54);
                } else if (body.kind === "black-hole") {
                    base = clamp(0.24 + (logRadius - 7.0) * 0.12, 0.22, 0.46);
                } else if (body.kind === "planet" || body.kind === "dwarf") {
                    base = clamp(0.12 + (logRadius - 5.5) * 0.08, 0.08, 0.33);
                } else if (body.kind === "moon") {
                    base = clamp(0.08 + (logRadius - 5.0) * 0.06, 0.05, 0.24);
                } else if (body.kind === "galaxy") {
                    base = clamp(0.38 + (logRadius - 20.0) * 0.05, 0.34, 0.58);
                } else if (body.kind === "cluster" || body.kind === "nebula") {
                    base = clamp(0.34 + (logRadius - 19.0) * 0.05, 0.3, 0.55);
                } else if (body.kind === "comet" || body.kind === "meteor") {
                    base = clamp(0.06 + (logRadius - 4.0) * 0.05, 0.04, 0.16);
                } else {
                    base = clamp(0.11 + (logRadius - 5.5) * 0.07, 0.07, 0.26);
                }

                let radius = base;
                if (parentNode) {
                    const parentPhysical = Math.max(parentNode.body.radiusMeters, 1);
                    const ratio = Math.max(body.radiusMeters / parentPhysical, 1e-6);
                    const relative = parentNode.displayRadius * Math.pow(ratio, 0.5) * 0.95;
                    const min = parentNode.displayRadius * (body.kind === "moon" ? 0.1 : 0.08);
                    const max = parentNode.displayRadius * (body.kind === "moon" ? 0.52 : 0.68);
                    radius = clamp(radius * 0.34 + relative * 0.66, min, max);
                }

                if (body.name === focusName) {
                    radius *= 1.08;
                }

                return clamp(radius, 0.03, 0.62);
            }

            function orbitRadiusForBody(body, parentNode) {
                const parentBody = parentNode.body;
                const semiMajor = Math.max(body.semiMajorMeters || parentBody.radiusMeters * 8, parentBody.radiusMeters * 2.2);

                const base = parentBody.kind === "star"
                    ? 0.55 + Math.log10(semiMajor / 2e9 + 1) * 0.52
                    : parentBody.kind === "planet"
                        ? 0.28 + Math.log10(semiMajor / 2e6 + 1) * 0.33
                        : 0.34 + Math.log10(semiMajor / 5e8 + 1) * 0.42;

                const min = Math.max(parentNode.displayRadius * 2.4, 0.26);
                const max = parentBody.kind === "star"
                    ? 2.95
                    : parentBody.kind === "planet"
                        ? 1.36
                        : 1.9;

                return clamp(Math.max(base, min), min, max);
            }

            function appearanceForBody(body, displayRadius) {
                const kind = body.kind;
                if (kind === "meteor") {
                    return {
                        geometry: `primitive: dodecahedron; radius: ${displayRadius.toFixed(4)}`,
                        material: `color: ${body.color}; roughness: 0.9; metalness: 0.04`,
                    };
                }
                if (kind === "comet") {
                    return {
                        geometry: `primitive: icosahedron; radius: ${displayRadius.toFixed(4)}`,
                        material: `color: ${body.color}; roughness: 0.74; metalness: 0.02`,
                    };
                }
                if (kind === "black-hole") {
                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: "color: #191a2d; roughness: 0.2; metalness: 0.35; emissive: #31377f; emissiveIntensity: 0.52",
                    };
                }
                if (kind === "galaxy") {
                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: `color: ${body.color}; roughness: 0.94; metalness: 0.02; opacity: 0.7; transparent: true`,
                    };
                }
                if (kind === "nebula") {
                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: `color: ${body.color}; roughness: 1; metalness: 0; opacity: 0.62; transparent: true`,
                    };
                }
                if (kind === "star") {
                    return {
                        geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                        material: `color: ${body.color}; roughness: 0.28; metalness: 0.04; emissive: ${body.color}; emissiveIntensity: 0.58`,
                    };
                }
                return {
                    geometry: `primitive: sphere; radius: ${displayRadius.toFixed(4)}`,
                    material: `color: ${body.color}; roughness: 0.76; metalness: 0.08`,
                };
            }

            function createBodyNode(body, parentNode, focusName, rootContainer) {
                const orbitAnchorEl = createEntity("a-entity", { position: "0 0 0" });
                const parentContainer = parentNode ? parentNode.orbitAnchorEl : rootContainer;
                parentContainer.appendChild(orbitAnchorEl);

                const displayRadius = displayRadiusForBody(body, parentNode, focusName);
                const appearance = appearanceForBody(body, displayRadius);

                const bodyMeshEl = createEntity("a-entity", {
                    geometry: appearance.geometry,
                    material: appearance.material,
                    position: "0 0 0",
                });
                orbitAnchorEl.appendChild(bodyMeshEl);

                let glowEl = null;
                if (body.kind === "star") {
                    glowEl = createEntity("a-entity", {
                        geometry: `primitive: sphere; radius: ${(displayRadius * 1.2).toFixed(4)}`,
                        material: `color: ${body.color}; opacity: 0.24; transparent: true; emissive: ${body.color}; emissiveIntensity: 0.48`,
                    });
                    orbitAnchorEl.appendChild(glowEl);
                }

                let cometTailEl = null;
                if (body.kind === "comet") {
                    cometTailEl = createEntity("a-entity", {
                        geometry: `primitive: cone; radiusBottom: ${(displayRadius * 0.7).toFixed(4)}; radiusTop: ${(displayRadius * 0.08).toFixed(4)}; height: ${(displayRadius * 4.2).toFixed(4)}`,
                        material: "color: #dcecff; opacity: 0.38; transparent: true",
                        position: `0 0 ${(-displayRadius * 2.5).toFixed(4)}`,
                        rotation: "-90 0 0",
                    });
                    orbitAnchorEl.appendChild(cometTailEl);
                }

                if (isRingedBody(body.name)) {
                    const ringEl = createEntity("a-entity", {
                        geometry: `primitive: torus; radius: ${(displayRadius * 1.62).toFixed(4)}; radiusTubular: ${(displayRadius * 0.19).toFixed(4)}; segmentsTubular: 56; segmentsRadial: 10`,
                        material: "color: #cdb58d; roughness: 0.84; metalness: 0.04; opacity: 0.72; transparent: true",
                        rotation: "90 10 0",
                    });
                    orbitAnchorEl.appendChild(ringEl);
                }

                if (body.kind === "black-hole") {
                    const accretionEl = createEntity("a-entity", {
                        geometry: `primitive: torus; radius: ${(displayRadius * 1.58).toFixed(4)}; radiusTubular: ${(displayRadius * 0.21).toFixed(4)}; segmentsTubular: 72; segmentsRadial: 12`,
                        material: "color: #7c8dff; opacity: 0.62; transparent: true; emissive: #3247cc; emissiveIntensity: 0.7",
                        rotation: "90 0 0",
                    });
                    orbitAnchorEl.appendChild(accretionEl);
                }

                if (body.kind === "galaxy") {
                    const diskEl = createEntity("a-entity", {
                        geometry: `primitive: torus; radius: ${(displayRadius * 1.42).toFixed(4)}; radiusTubular: ${(displayRadius * 0.26).toFixed(4)}; segmentsTubular: 92; segmentsRadial: 14`,
                        material: `color: ${body.color}; opacity: 0.36; transparent: true`,
                        rotation: "88 0 0",
                    });
                    orbitAnchorEl.appendChild(diskEl);
                }

                if (body.name === focusName) {
                    const focusRing = createEntity("a-entity", {
                        geometry: `primitive: torus; radius: ${(displayRadius * 1.38).toFixed(4)}; radiusTubular: ${(displayRadius * 0.05).toFixed(4)}; segmentsTubular: 52; segmentsRadial: 8`,
                        material: "color: #9dc8ff; opacity: 0.74; transparent: true",
                        rotation: "90 0 0",
                    });
                    orbitAnchorEl.appendChild(focusRing);
                }

                const label = createEntity("a-text", {
                    value: body.name === focusName ? `${body.name} [fokus]` : body.name,
                    align: "center",
                    color: body.name === focusName ? "#eaf4ff" : "#c8daff",
                    position: `0 ${(displayRadius * 1.9).toFixed(4)} 0`,
                    side: "double",
                    width: "2.6",
                    scale: "0.58 0.58 0.58",
                });
                orbitAnchorEl.appendChild(label);

                let orbitRadius = 0;
                let orbitTrackEl = null;
                if (parentNode) {
                    orbitRadius = orbitRadiusForBody(body, parentNode);
                    orbitTrackEl = createEntity("a-entity", {
                        geometry: `primitive: ring; radiusInner: ${(orbitRadius - 0.003).toFixed(4)}; radiusOuter: ${(orbitRadius + 0.003).toFixed(4)}; segmentsTheta: 96`,
                        material: "color: #7ea8e6; opacity: 0.24; transparent: true; side: double",
                        rotation: "-90 0 0",
                        position: "0 0 0",
                    });
                    parentNode.orbitAnchorEl.appendChild(orbitTrackEl);
                }

                const orbitOmega = parentNode && body.periodDays
                    ? TAU / Math.max(body.periodDays * DAY_SECONDS, 1)
                    : 0;
                const spinOmega = TAU / Math.max(Math.abs(body.rotationHours || 30) * 3600, 1);

                return {
                    body,
                    parentNode,
                    orbitAnchorEl,
                    bodyMeshEl,
                    glowEl,
                    cometTailEl,
                    orbitTrackEl,
                    displayRadius,
                    orbitRadius,
                    orbitOmega,
                    spinOmega,
                    spinSign: (body.rotationHours || 1) < 0 ? -1 : 1,
                    phase: seededRange(body.name, 0, TAU, 109),
                    inclinationRad: ((Number.isFinite(body.inclinationDeg) ? body.inclinationDeg : seededRange(body.name, 0, 15, 113)) * Math.PI) / 180,
                    pulseSeed: seededRange(body.name, 0, TAU, 127),
                };
            }

            function buildArSystem(focusBody) {
                modelRoot.innerHTML = "";

                const system = buildDisplayBodies(focusBody);
                const rootContainer = createEntity("a-entity", { position: "0 0.22 0" });
                modelRoot.appendChild(rootContainer);

                const nodes = [];
                const nodeByName = new Map();

                const orderedBodies = system.bodies.slice().sort((a, b) => {
                    const depthA = depthFromRoot(a, system.rootBody.name);
                    const depthB = depthFromRoot(b, system.rootBody.name);
                    if (depthA !== depthB) {
                        return depthA - depthB;
                    }
                    return sortByOrbit(a, b);
                });

                for (const body of orderedBodies) {
                    let parentNode = null;
                    if (body.name !== system.rootBody.name) {
                        parentNode = body.parentName ? nodeByName.get(body.parentName) || null : null;
                        if (!parentNode) {
                            parentNode = nodeByName.get(system.rootBody.name) || null;
                        }
                    }

                    const node = createBodyNode(body, parentNode, system.focusBody.name, rootContainer);
                    nodes.push(node);
                    nodeByName.set(body.name, node);
                }

                return {
                    rootBody: system.rootBody,
                    focusBody: system.focusBody,
                    nodes,
                    nodeByName,
                    rootContainer,
                };
            }

            let orbitDaysPerSecond = clamp(Number(speedRange.value) || 2.5, 0.05, 24);
            speedValue.textContent = `${orbitDaysPerSecond.toFixed(2)} hari/detik`;

            const focusBody = resolveBodyByName(requestedModel);
            const arSystem = buildArSystem(focusBody);

            systemMetaEl.textContent = `Root: ${arSystem.rootBody.name} | Fokus: ${arSystem.focusBody.name} | Node AR: ${arSystem.nodes.length}`;
            statusEl.textContent = "Aktifkan kamera, scan marker Hiro, lalu gunakan drag/pinch untuk rotate dan zoom.";

            let viewScale = 1;
            let viewRotX = -0.16;
            let viewRotY = 0.34;

            function applyViewTransform() {
                const obj = modelRoot.object3D;
                obj.position.set(0, 0.22, 0);
                obj.scale.setScalar(viewScale);
                obj.rotation.set(viewRotX, viewRotY, 0);
            }

            function zoomBy(factor) {
                viewScale = clamp(viewScale * factor, 0.45, 2.8);
                applyViewTransform();
            }

            function resetView() {
                viewScale = 1;
                viewRotX = -0.16;
                viewRotY = 0.34;
                applyViewTransform();
            }

            zoomInButton.addEventListener("click", () => zoomBy(1.12));
            zoomOutButton.addEventListener("click", () => zoomBy(0.9));
            rotLeftButton.addEventListener("click", () => {
                viewRotY -= 0.18;
                applyViewTransform();
            });
            rotRightButton.addEventListener("click", () => {
                viewRotY += 0.18;
                applyViewTransform();
            });
            viewResetButton.addEventListener("click", resetView);

            speedRange.addEventListener("input", () => {
                orbitDaysPerSecond = clamp(Number(speedRange.value) || 2.5, 0.05, 24);
                speedValue.textContent = `${orbitDaysPerSecond.toFixed(2)} hari/detik`;
            });

            let markerDetected = false;
            let cameraReady = false;

            function cameraVideoElement() {
                const byId = document.getElementById("arjs-video");
                if (byId && byId !== pipCameraVideo) {
                    byId.classList.add("ar-main-video");
                    return byId;
                }

                const byClass = document.querySelector("video.arjs-video:not(#pip-camera-video), video.ar-main-video:not(#pip-camera-video)");
                if (byClass) {
                    byClass.classList.add("ar-main-video");
                    return byClass;
                }

                const candidates = Array.from(document.querySelectorAll("video:not(#pip-camera-video)"));
                if (!candidates.length) {
                    return null;
                }

                candidates.sort((a, b) => {
                    const areaA = (Number(a.videoWidth) || 0) * (Number(a.videoHeight) || 0);
                    const areaB = (Number(b.videoWidth) || 0) * (Number(b.videoHeight) || 0);
                    return areaB - areaA;
                });

                const mainVideo = candidates[0];
                mainVideo.classList.add("ar-main-video");
                return mainVideo;
            }

            function updateCameraReadyStatus() {
                const video = cameraVideoElement();
                if (!video) {
                    return false;
                }

                video.setAttribute("playsinline", "true");
                video.setAttribute("webkit-playsinline", "true");
                video.style.opacity = "1";
                applyMainVideoLayer();
                applySceneCanvasLayout();
                syncPipCameraStream();

                if (video.readyState >= 2 || (video.videoWidth > 0 && video.videoHeight > 0)) {
                    if (!cameraReady) {
                        cameraReady = true;
                        autoCloseSheetAfterCameraReady();
                        if (!markerDetected) {
                            statusEl.textContent = "Kamera aktif. Arahkan marker Hiro (25-60% area layar) agar objek muncul.";
                        }
                    }
                    return true;
                }

                return false;
            }

            function handleCameraInit() {
                cameraReady = true;
                applyMainVideoLayer();
                applySceneCanvasLayout();
                syncPipCameraStream();
                bindArMiniSwapTarget();
                autoCloseSheetAfterCameraReady();
                if (!markerDetected) {
                    statusEl.textContent = "Kamera AR terinisialisasi. Arahkan ke marker Hiro sekarang.";
                }
            }

            function handleCameraError() {
                statusEl.textContent = "Gagal membuka kamera. Pastikan izin kamera aktif dan browser mendukung WebRTC.";
            }

            window.addEventListener("camera-init", handleCameraInit);
            sceneEl.addEventListener("camera-init", handleCameraInit);
            window.addEventListener("camera-error", handleCameraError);
            sceneEl.addEventListener("camera-error", handleCameraError);

            sceneEl.addEventListener("loaded", () => {
                applyMainVideoLayer();
                applySceneCanvasLayout();
                bindArMiniSwapTarget();
                statusEl.textContent = "Scene AR siap. Menunggu kamera dan marker Hiro.";
            });

            sceneEl.addEventListener("renderstart", () => {
                applyMainVideoLayer();
                applySceneCanvasLayout();
                bindArMiniSwapTarget();
                updateCameraReadyStatus();
            });

            window.addEventListener("resize", () => {
                applyMainVideoLayer();
                applySceneCanvasLayout();
            });

            let cameraPollTick = 0;
            const cameraPoll = window.setInterval(() => {
                cameraPollTick += 1;
                const ready = updateCameraReadyStatus();
                if (ready || cameraPollTick > 40) {
                    window.clearInterval(cameraPoll);
                }
            }, 400);

            window.setTimeout(() => {
                if (!cameraReady) {
                    statusEl.textContent = "Kamera belum aktif. Cek izin kamera browser, lalu reload halaman AR.";
                    return;
                }
                if (!markerDetected) {
                    statusEl.textContent = "Kamera aktif, tapi marker belum terbaca. Dekatkan HP ke marker Hiro dan hindari blur/pantulan layar.";
                }
            }, 12000);

            const activePointers = new Map();
            let pinchDistance = 0;

            function pointerDistance(points) {
                if (points.length < 2) {
                    return 0;
                }
                return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
            }

            gesturePad.addEventListener("pointerdown", (event) => {
                activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
                gesturePad.setPointerCapture(event.pointerId);
                if (activePointers.size === 2) {
                    pinchDistance = pointerDistance(Array.from(activePointers.values()));
                }
            });

            gesturePad.addEventListener("pointermove", (event) => {
                const prev = activePointers.get(event.pointerId);
                if (!prev) {
                    return;
                }

                const next = { x: event.clientX, y: event.clientY };
                activePointers.set(event.pointerId, next);

                if (activePointers.size === 1) {
                    const dx = next.x - prev.x;
                    const dy = next.y - prev.y;
                    viewRotY += dx * 0.008;
                    viewRotX = clamp(viewRotX + dy * 0.005, -0.88, 0.88);
                    applyViewTransform();
                    return;
                }

                if (activePointers.size === 2) {
                    const points = Array.from(activePointers.values());
                    const dist = pointerDistance(points);
                    if (pinchDistance > 0 && dist > 0) {
                        zoomBy(Math.pow(dist / pinchDistance, 1.02));
                    }
                    pinchDistance = dist;
                }
            });

            function releasePointer(pointerId) {
                activePointers.delete(pointerId);
                if (activePointers.size < 2) {
                    pinchDistance = 0;
                }
            }

            gesturePad.addEventListener("pointerup", (event) => releasePointer(event.pointerId));
            gesturePad.addEventListener("pointercancel", (event) => releasePointer(event.pointerId));
            gesturePad.addEventListener("pointerleave", (event) => releasePointer(event.pointerId));

            gesturePad.addEventListener("wheel", (event) => {
                event.preventDefault();
                zoomBy(event.deltaY < 0 ? 1.08 : 0.92);
            }, { passive: false });

            applyViewTransform();

            let lastFrameMs = performance.now();
            function animateFrame(nowMs) {
                const dtSec = clamp((nowMs - lastFrameMs) / 1000, 0, 0.08);
                lastFrameMs = nowMs;

                const simSec = dtSec * orbitDaysPerSecond * DAY_SECONDS;
                for (const node of arSystem.nodes) {
                    if (node.parentNode && node.orbitOmega > 0 && node.orbitRadius > 0) {
                        node.phase = (node.phase + node.orbitOmega * simSec) % TAU;
                        const cosP = Math.cos(node.phase);
                        const sinP = Math.sin(node.phase);
                        const x = node.orbitRadius * cosP;
                        const zPlane = node.orbitRadius * sinP;
                        const y = zPlane * Math.sin(node.inclinationRad);
                        const z = zPlane * Math.cos(node.inclinationRad);
                        node.orbitAnchorEl.object3D.position.set(x, y, z);
                    }

                    node.bodyMeshEl.object3D.rotation.y += node.spinSign * node.spinOmega * simSec;

                    if (node.glowEl) {
                        const glowScale = 1 + Math.sin(nowMs / 520 + node.pulseSeed) * 0.04;
                        node.glowEl.object3D.scale.setScalar(glowScale);
                    }

                    if (node.cometTailEl) {
                        node.cometTailEl.object3D.rotation.y += 0.09 * dtSec;
                    }
                }

                requestAnimationFrame(animateFrame);
            }
            requestAnimationFrame(animateFrame);

            markerEl.addEventListener("markerFound", function () {
                markerDetected = true;
                statusEl.textContent = "Marker terdeteksi. Sistem AR aktif: orbit + rotasi berjalan real-time.";
            });

            markerEl.addEventListener("markerLost", function () {
                markerDetected = false;
                statusEl.textContent = "Marker hilang. Arahkan kamera ke marker Hiro agar sistem AR muncul lagi.";
            });

            if (window.location.protocol !== "https:" && window.location.hostname !== "localhost") {
                statusEl.textContent = "Perlu HTTPS agar izin kamera AR bisa aktif di browser modern.";
            }
        })();
    </script>
</body>

</html>
